    .stagger > *:nth-child(2)  { animation-delay: 0.04s; }
    .stagger > *:nth-child(3)  { animation-delay: 0.08s; }
    .stagger > *:nth-child(4)  { animation-delay: 0.12s; }

    .stagger > *:nth-child(6)  { animation-delay: 0.20s; }

    .stagger > *:nth-child(10) { animation-delay: 0.36s; }
    .stagger > *:nth-child(11) { animation-delay: 0.40s; }
    .stagger > *:nth-child(12) { animation-delay: 0.44s; }

    const todayKST = () => {
      const d = new Date();
      const kst = new Date(d.getTime() + 9 * 3600000 - d.getTimezoneOffset() * 60000);
      return kst.toISOString().slice(0, 10);
    };
    const fmtDate = (iso) => {

      return `${d.getMonth()+1}/${d.getDate()}`;
    };
    const daysUntil = (iso) => {
      if (!iso) return null;
      const t = new Date(todayKST() + 'T00:00:00+09:00').getTime();
      const d = new Date(iso + 'T00:00:00+09:00').getTime();
      return Math.round((d - t) / 86400000);

    function LoginScreen({ pins, onLogin }) {
      const [stage, setStage] = useState('pick'); // pick | pin
      const [picked, setPicked] = useState(null);
      const [pin, setPin] = useState('');
      const [err, setErr] = useState('');
      const inputRef = useRef(null);

      const choose = (id) => {
        setPicked(id);
        setPin('');
        setErr('');
        setStage('pin');
        try { window.history.pushState({ grcLoginPin: true }, ''); } catch {}
        setTimeout(() => inputRef.current && inputRef.current.focus(), 50);
      };
      useEffect(() => {
        const onPop = () => {
          if (stage === 'pin') {
            setStage('pick'); setPicked(null); setPin(''); setErr('');
          }
        };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, [stage]);
      const submit = (e) => {
        if (e) e.preventDefault();
        if (pin.length !== 4) return;
        if (onLogin(picked, pin)) {
          // success - parent will re-render
        } else {
          setErr('л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ');
          setPin('');
        }
      };

      const groups = [
        { id: 'head',  label: 'MANAGER', members: MEMBERS.filter(m => m.group === 'head') },
        ...PARTS.map(p => ({ id: p.id, label: 'Pod ' + PART_THEME[p.id].numeral, members: p.members.map(memberById) })),
      ];
      const me = picked ? memberById(picked) : null;

      return (
        <div className="min-h-screen flex items-center justify-center px-6 relative" style={{background: 'linear-gradient(135deg, var(--header-from) 0%, var(--header-to) 100%)'}}>

            </div>
            {stage === 'pick' && (
              <div className="rounded-lg p-8" style={{background:'var(--surface)', border:'1px solid var(--border)'}}>

                <div className="space-y-5">
                  {groups.map(g => (
                    <div key={g.id}>
                      <div className="text-xs font-eyebrow uppercase mb-2" style={{color:'var(--text-faint)'}}>{g.label}</div>
                      <div className="flex flex-wrap gap-2">
                        {g.members.map(m => (
                          <button key={m.id} onClick={() => choose(m.id)}

                                  style={{background:'var(--surface)', border:'1px solid var(--border-strong)', color:'var(--text)'}}
                                  onMouseEnter={(e)=>{e.currentTarget.style.borderColor='var(--ink)';e.currentTarget.style.background='var(--surface-2)';}}
                                  onMouseLeave={(e)=>{e.currentTarget.style.borderColor='var(--border-strong)';e.currentTarget.style.background='var(--surface)';}}>

              <div className="space-y-4">
                <div>
                  <label className="text-[10px] tracking-[0.2em] uppercase mb-1.5 block" style={{color:'var(--text-muted)'}}>мғҲ л№„л°ҖлІҲнҳё (4мһҗлҰ¬)</label>
                  <input type="password" inputMode="numeric" maxLength={4} value={newPin}
                         onChange={(e) => { setErr(''); setNewPin(e.target.value.replace(/[^0-9]/g,'').slice(0,4)); }}
                         autoFocus autoComplete="off"
                         className={inputCls} style={inputStyle} />
                </div>
                <div>
                  <label className="text-[10px] tracking-[0.2em] uppercase mb-1.5 block" style={{color:'var(--text-muted)'}}>л№„л°ҖлІҲнҳё нҷ•мқё</label>
                  <input type="password" inputMode="numeric" maxLength={4} value={confirmPin}
                         onChange={(e) => { setErr(''); setConfirmPin(e.target.value.replace(/[^0-9]/g,'').slice(0,4)); }}
                         autoComplete="off"
                         className={inputCls} style={inputStyle} />
                </div>
              </div>
              {err && <p className="text-xs mt-3" style={{color:'#a83247'}}>{err}</p>}
              <button type="submit" disabled={newPin.length !== 4 || confirmPin.length !== 4}
                      className="w-full mt-6 py-2.5 rounded-sm transition text-sm tracking-wide disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{background:'var(--ink)', color:'white'}}>
                м„Өм • мҷ„лЈҢ
              </button>
              <button type="button" onClick={onLogout}
                      className="w-full mt-2 py-2 text-xs tracking-wider transition" style={{color:'var(--text-muted)'}}>
                лӢӨлҘё кі„м •мңјлЎң лЎңк·ёмқё
              </button>
            </form>
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState('board');
      const [tasks, setTasks] = useState([]);
      const [posts, setPosts] = useState([]);
      const [events, setEvents] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [openBrand, setOpenBrand] = useState(null);
      const [openMember, setOpenMember] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [currentUser, setCurrentUser] = useState(null);
      const [pins, setPins] = useState({});
      const [emojis, setEmojis] = useState({});
      const [mustSetPin, setMustSetPin] = useState(false);

      // Firestore real-time sync: tasks
      useEffect(() => {
        const unsub = window.db.collection('tasks').onSnapshot(snap => {
          const arr = [];
          snap.forEach(doc => arr.push({ ...doc.data(), id: doc.id }));
          arr.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
          setTasks(arr);
          setLoaded(true);
        }, err => {
          console.error('tasks onSnapshot error:', err);
          setLoaded(true);
        });
        return () => unsub();
      }, []);

      // Firestore real-time sync: pins (also stores per-user emoji avatar)
      useEffect(() => {
        const unsub = window.db.collection('pins').onSnapshot(snap => {
          const pinMap = {};
          const emojiMap = {};
          MEMBERS.forEach(m => { pinMap[m.id] = '0000'; emojiMap[m.id] = ''; });
          snap.forEach(doc => {
            const data = doc.data() || {};
            pinMap[doc.id] = data.pin || '0000';
            emojiMap[doc.id] = data.emoji || '';
          });
          setPins(pinMap);
          setEmojis(emojiMap);
        }, err => console.error('pins onSnapshot error:', err));
        return () => unsub();
      }, []);

      // Firestore real-time sync: posts (board)
      useEffect(() => {
        const unsub = window.db.collection('posts').onSnapshot(snap => {
          const arr = [];
          snap.forEach(doc => arr.push({ ...doc.data(), id: doc.id }));
          arr.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
          setPosts(arr);
        }, err => console.error('posts onSnapshot error:', err));
        return () => unsub();
      }, []);

      // Firestore real-time sync: events (calendar)
      useEffect(() => {
        const unsub = window.db.collection('events').onSnapshot(snap => {
          const arr = [];
          snap.forEach(doc => arr.push({ ...doc.data(), id: doc.id }));
          arr.sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.startTime || '').localeCompare(b.startTime || ''));
          setEvents(arr);
        }, err => console.error('events onSnapshot error:', err));
        return () => unsub();
      }, []);

      // Restore session id from localStorage (session only, data is shared)
      useEffect(() => {
        const savedUser = localStorage.getItem(USER_KEY);
        if (savedUser && MEMBERS.find(m => m.id === savedUser)) {
          setCurrentUser(savedUser);
        }
      }, []);

      // After pins load, force PIN re-set if user is still on '0000'
      useEffect(() => {
        if (currentUser && pins[currentUser] === '0000') setMustSetPin(true);
      }, [currentUser, pins]);

      const login = (id, pin) => {
        if (pins[id] !== pin) return false;
        setCurrentUser(id);
        try { localStorage.setItem(USER_KEY, id); } catch {}
        if (pin === '0000') setMustSetPin(true);
        return true;
      };
      const logout = () => {
        setCurrentUser(null);
        setMustSetPin(false);
        try { localStorage.removeItem(USER_KEY); } catch {}
      };
      const setPin = async (id, pin) => {
        try { await window.db.collection('pins').doc(id).set({ pin }, { merge: true }); }
        catch (e) { console.error('setPin failed', e); alert('л№„л°ҖлІҲнҳё м ҖмһҘ мӢӨнҢЁ: ' + e.message); return; }
        if (id === currentUser && pin !== '0000') setMustSetPin(false);
      };
      const resetPinAdmin = async (id) => {
        try { await window.db.collection('pins').doc(id).set({ pin: '0000' }, { merge: true }); }
        catch (e) { console.error('resetPin failed', e); }
      };
      const setMyEmoji = async (emoji) => {
        try { await window.db.collection('pins').doc(currentUser).set({ emoji }, { merge: true }); }
        catch (e) { console.error('setEmoji failed', e); alert('мқҙлӘЁнӢ°мҪҳ м ҖмһҘ мӢӨнҢЁ: ' + e.message); }
      };
      const resetPin = (id) => resetPinAdmin(id);

      const addComment = async (taskId, body) => {
        const t = tasks.find(x => x.id === taskId);
        if (!t) return;
        const c = {
          id: 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5),
          authorId: currentUser,
          body: body,
          createdAt: new Date().toISOString(),
        };
        await updateTask(taskId, { comments: [...(t.comments || []), c] });
      };

      const deleteComment = async (taskId, commentId) => {
        const t = tasks.find(x => x.id === taskId);
        if (!t) return;
        await updateTask(taskId, { comments: (t.comments || []).filter(c => c.id !== commentId) });
      };

      // Posts CRUD (board)
      const addPost = async (title, body) => {
        const id = 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
        const p = {
          id, authorId: currentUser,
          title: title || '',
          body: body || '',
          comments: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        };
        try { await window.db.collection('posts').doc(id).set(p); }
        catch (e) { console.error('addPost failed', e); alert('кІҢмӢң мӢӨнҢЁ: ' + e.message); }
      };
      const updatePost = async (id, patch) => {
        try {
          await window.db.collection('posts').doc(id).update({
            ...patch, updatedAt: new Date().toISOString(),
          });
        } catch (e) { console.error('updatePost failed', e); }
      };
      const deletePost = async (id) => {
        try { await window.db.collection('posts').doc(id).delete(); }
        catch (e) { console.error('deletePost failed', e); }
      };
      const addPostComment = async (postId, body) => {
        const p = posts.find(x => x.id === postId);
        if (!p) return;
        const c = {
          id: 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
          authorId: currentUser, body,
          createdAt: new Date().toISOString(),
        };
        await updatePost(postId, { comments: [...(p.comments || []), c] });
      };
      const deletePostComment = async (postId, commentId) => {
        const p = posts.find(x => x.id === postId);
        if (!p) return;
        await updatePost(postId, { comments: (p.comments || []).filter(c => c.id !== commentId) });
      };

      // Calendar events CRUD
      const addEvent = async (data) => {
        const id = 'ev_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
        const ev = {
          id,
          authorId: currentUser,
          date: data.date,                 // YYYY-MM-DD (KST)
          endDate: data.endDate || data.date,
          allDay: !!data.allDay,
          startTime: data.startTime || '', // HH:MM
          endTime: data.endTime || '',
          title: data.title || '',
          description: data.description || '',
          category: data.category || 'etc',
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        };
        try { await window.db.collection('events').doc(id).set(ev); }
        catch (e) { console.error('addEvent failed', e); alert('мқјм • л“ұлЎқ мӢӨнҢЁ: ' + e.message); }
      };
      const updateEvent = async (id, patch) => {
        try {
          await window.db.collection('events').doc(id).update({
            ...patch, updatedAt: new Date().toISOString(),
          });
        } catch (e) { console.error('updateEvent failed', e); }
      };
      const deleteEvent = async (id) => {
        try { await window.db.collection('events').doc(id).delete(); }
        catch (e) { console.error('deleteEvent failed', e); }
      };

      const addTask = async (data) => {
        const id = newId();
        const t = {
          id,
          brandId: data.brandId,
          title: data.title,
          description: data.description || '',
          assigneeIds: data.assigneeIds || [],
          dueDate: data.dueDate || '',
          priority: data.priority || 'normal',
          status: data.status || 'pending',
          private: !!data.private,
          createdBy: currentUser,
          comments: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        };
        try { await window.db.collection('tasks').doc(id).set(t); }
        catch (e) { console.error('addTask failed', e); alert('мһ‘м—… л“ұлЎқ мӢӨнҢЁ: ' + e.message); }
      };
      const updateTask = async (id, patch) => {
        try {
          await window.db.collection('tasks').doc(id).update({
            ...patch,
            updatedAt: new Date().toISOString(),
          });
        } catch (e) { console.error('updateTask failed', e); }
      };
      const deleteTask = async (id) => {
        try { await window.db.collection('tasks').doc(id).delete(); }
        catch (e) { console.error('deleteTask failed', e); }
      };
      const removeOrDelete = async (id) => {
        const t = tasks.find(x => x.id === id);
        if (!t) return;
        const ids = t.assigneeIds || (t.assigneeId ? [t.assigneeId] : []);
        const others = ids.filter(x => x !== currentUser);
        if (ids.includes(currentUser) && others.length > 0) {
          await updateTask(id, { assigneeIds: others });
        } else {
          await deleteTask(id);
        }
      };
      const cycleStatus = (id) => {
        const t = tasks.find(x => x.id === id);
        if (!t) return;
        const order = ['pending', 'in_progress', 'review', 'done'];
        const idx = order.indexOf(t.status);
        updateTask(id, { status: order[(idx + 1) % order.length] });
      };


      // Browser back-button awareness:
      // any time a modal/expansion opens, push a history state. popstate (back) closes it.
      const isAnyOpen = !!(openBrand || openMember || showAdd || editingTask);
      useEffect(() => {
        if (isAnyOpen) {
          window.history.pushState({ grcModal: true }, '');
          const onPop = () => {
            // Close in priority order, top-most first.
            if (editingTask) { setEditingTask(null); return; }
            if (showAdd) { setShowAdd(false); return; }
            if (openMember) { setOpenMember(null); return; }
            if (openBrand) { setOpenBrand(null); return; }
          };
          window.addEventListener('popstate', onPop);
          return () => window.removeEventListener('popstate', onPop);
        }
      }, [isAnyOpen]);

      // Visibility: a private task is only visible to its assignees, its author, and lee_dh.
      const canSeeTask = (t) => {
        if (!t || !t.private) return true;
        if (currentUser === 'lee_dh') return true;
        if (t.createdBy === currentUser) return true;
        const ids = t.assigneeIds || (t.assigneeId ? [t.assigneeId] : []);
        return ids.includes(currentUser);
      };
      const visibleTasks = useMemo(() => tasks.filter(canSeeTask), [tasks, currentUser]);

      const stats = useMemo(() => {
        const byBrand = {}, byBrandActive = {}, byMember = {}, byMemberActive = {}, byMemberPending = {}, byMemberMentions = {}, byMemberReplies = {};
        const byPart = {}, byPartActive = {};
        visibleTasks.forEach(t => {
          if (t.brandId && t.brandId !== '__all__') {
            byBrand[t.brandId] = (byBrand[t.brandId] || 0) + 1;
            if (t.status !== 'done') byBrandActive[t.brandId] = (byBrandActive[t.brandId] || 0) + 1;
          }
          const ids = t.assigneeIds || (t.assigneeId ? [t.assigneeId] : []);
          ids.forEach(aid => {
            byMember[aid] = (byMember[aid] || 0) + 1;
            if (t.status !== 'done') byMemberActive[aid] = (byMemberActive[aid] || 0) + 1;
            if (t.status === 'pending') byMemberPending[aid] = (byMemberPending[aid] || 0) + 1;
          });
          // count mentions in description + comments
          extractMentionIds(t.description || '').forEach(mid => {
            byMemberMentions[mid] = (byMemberMentions[mid] || 0) + 1;
          });
          (t.comments || []).forEach(c => {
            extractMentionIds(c.body || '').forEach(mid => {
              byMemberMentions[mid] = (byMemberMentions[mid] || 0) + 1;
            });
            if (t.createdBy && c.authorId !== t.createdBy) {
              byMemberReplies[t.createdBy] = (byMemberReplies[t.createdBy] || 0) + 1;
            }
          });
          const b = brandById(t.brandId);
          if (b) {
            byPart[b.part] = (byPart[b.part] || 0) + 1;
            if (t.status !== 'done') byPartActive[b.part] = (byPartActive[b.part] || 0) + 1;
          }
        });
        const active = tasks.filter(t => t.status !== 'done').length;
        const inProgress = tasks.filter(t => t.status === 'in_progress').length;
        const overdue = tasks.filter(t => t.status !== 'done' && t.dueDate && daysUntil(t.dueDate) < 0).length;
        return { byBrand, byBrandActive, byMember, byMemberActive, byMemberPending, byMemberMentions, byMemberReplies, byPart, byPartActive, active, inProgress, overdue, total: tasks.length };
      }, [visibleTasks]);

      if (!loaded) {
        return (
          <div className="min-h-screen flex items-center justify-center" style={{background:'var(--bg)', color:'var(--text-faint)'}}>
            <div className="text-xs tracking-[0.3em] uppercase">Loading</div>
          </div>
        );
      }
      if (!currentUser) {
        return <LoginScreen pins={pins} onLogin={login} />;
      }
      if (mustSetPin) {
        return <ForceSetPinScreen
                 currentUser={currentUser}
                 onSetPin={(p) => setPin(currentUser, p)}
                 onLogout={logout} />;
      }

      return (
        <div className="min-h-screen" style={{background:'var(--bg)', color:'var(--text)'}}>
          <Header view={view} setView={setView} currentUser={currentUser} onLogout={logout} pins={pins} emojis={emojis} onSetPin={setPin} onSetEmoji={setMyEmoji} onResetPin={resetPin} />

          <main className="max-w-6xl mx-auto px-8 py-12">
            <div className="mb-8 pb-5 flex items-end justify-between gap-4 flex-wrap" style={{borderBottom:'1px solid var(--border)'}}>
              <h2 className="font-display text-xl tracking-tight" style={{color:'var(--text-faint)'}}>
                {view === 'board' ? 'нҢҖ кІҢмӢңнҢҗ' : view === 'calendar' ? 'нҢҖ мәҳлҰ°лҚ”' : 'лӢҙлӢ№мһҗлі„ м•„м  лӢӨ'}
              </h2>
              <div className="flex items-center gap-2">
                {view !== 'board' && view !== 'calendar' && (
                  <button
                    onClick={() => setShowAdd(true)}
                    className="text-xs px-4 py-1.5 rounded-full transition tracking-wide flex items-center gap-1.5"
                    style={{background:'transparent', color:'var(--ink)', border:'1px solid var(--ink)', fontWeight:500}}
                    onMouseEnter={(e)=>{e.currentTarget.style.background='var(--ink)';e.currentTarget.style.color='white';}}
                    onMouseLeave={(e)=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--ink)';}}>
                    <Plus size={12} strokeWidth={2.2} /> мғҲ мһ‘м—…
                  </button>
                )}
              </div>
            </div>
            {view === 'board' ? (
              <BoardView
                posts={posts}
                currentUser={currentUser}
                emojis={emojis}
                onAdd={addPost}
                onUpdate={updatePost}
                onDelete={deletePost}
                onAddComment={addPostComment}
                onDeleteComment={deletePostComment}
              />
            ) : view === 'calendar' ? (
              <CalendarView
                events={events}
                currentUser={currentUser}
                emojis={emojis}
                onAdd={addEvent}
                onUpdate={updateEvent}
                onDelete={deleteEvent}
              />
            ) : (
              <MembersView
                tasks={visibleTasks}
                stats={stats}
                onOpenMember={(id) => setOpenMember(id)}
              />
            )}
          </main>

          <footer className="max-w-6xl mx-auto px-8 py-10 text-xs border-t flex flex-col gap-1.5" style={{color:'var(--text-faint)', borderColor:'var(--border)'}}>
            <span className="tracking-[0.25em] uppercase">Grace International В· Brand Management В· Operations</span>
            <span className="tracking-wider">к°ңл°ңмһҗ : BMл¶Җ мқҙлҸҷнҳ„ м°ЁмһҘ</span>
          </footer>

          {openBrand && (
            <BrandModal
              brandId={openBrand}
              tasks={tasks.filter(t => t.brandId === openBrand)}
              onClose={() => setOpenBrand(null)}
              onAdd={addTask} onUpdate={updateTask} onDelete={removeOrDelete}
              onChangeStatus={(id, next) => updateTask(id, { status: next })} onEdit={(t) => setEditingTask(t)}
              currentUser={currentUser}
              onAddComment={addComment} onDeleteComment={deleteComment}
            />
          )}
          {openMember && (
            <MemberModal
              memberId={openMember}
              tasks={visibleTasks}
              allTasks={visibleTasks}
              onClose={() => setOpenMember(null)}
              onUpdate={updateTask} onDelete={removeOrDelete}
              onChangeStatus={(id, next) => updateTask(id, { status: next })} onEdit={(t) => setEditingTask(t)}
              currentUser={currentUser}
              onAddComment={addComment} onDeleteComment={deleteComment}
              onOpenBrand={(id) => { setOpenMember(null); setOpenBrand(id); }}
              onAssign={(memberId) => { setOpenMember(null); setShowAdd({ assigneeIds: [memberId] }); }}
            />
          )}
          {showAdd && (
            <TaskFormModal
              mode="create" initialBrand={null}
              initial={typeof showAdd === 'object' ? showAdd : null}
              onClose={() => setShowAdd(false)}
              onSubmit={(data) => { addTask(data); setShowAdd(false); }}
            />
          )}
          {editingTask && (
            <TaskFormModal
              mode="edit" initial={editingTask}
              onClose={() => setEditingTask(null)}
              onSubmit={(data) => { updateTask(editingTask.id, data); setEditingTask(null); }}
            />
          )}
        </div>
      );
    }

    /* ============================================================
       HEADER (Grace-style brand bar)
       ============================================================ */
    function Header({ view, setView, currentUser, onLogout, pins, emojis, onSetPin, onSetEmoji, onResetPin }) {
      const reload = () => { window.scrollTo({top:0, behavior:'smooth'}); setView('board'); setTimeout(() => window.location.reload(), 50); };
      const me = memberById(currentUser);
      const headerBg = 'linear-gradient(180deg, var(--header-from) 0%, var(--header-to) 100%)';
      const textCol = 'rgba(255,255,255,0.92)';
      const mutedCol = 'rgba(255,255,255,0.62)';
      const dividerCol = 'rgba(255,255,255,0.18)';
      const borderCol = 'rgba(255,255,255,0.12)';

      return (
        <header className="sticky top-0 z-30 backdrop-blur"
                style={{background: headerBg, borderBottom: '1px solid ' + borderCol}}>
          <div className="max-w-6xl mx-auto px-4 sm:px-8 py-4 sm:py-5 flex items-center justify-between gap-3 sm:gap-6">
            <button onClick={reload} className="flex items-center gap-2 sm:gap-4 group cursor-pointer flex-shrink-0" title="мІҳмқҢмңјлЎң">
              <img src={LOGO_SRC} alt="Grace International"
                   style={{height:'22px', width:'auto'}}
                   className="opacity-95 group-hover:opacity-100" />
              <span className="hidden md:inline-block w-px h-5" style={{background: dividerCol}}></span>
              <span className="hidden md:inline text-xs font-eyebrow uppercase"
                    style={{color: mutedCol, fontWeight: 500}}>
                Brand Management
              </span>
            </button>
            <div className="flex items-center gap-2 sm:gap-5">
              <div className="flex items-center">
                <TabBtn active={view === 'board'}    onClick={() => setView('board')}    label="кІҢмӢңнҢҗ" sub="Board" />
                <TabBtn active={view === 'members'}  onClick={() => setView('members')}  label="лӢҙлӢ№мһҗ" sub="People" />
                <TabBtn active={view === 'calendar'} onClick={() => setView('calendar')} label="мәҳлҰ°лҚ”" sub="Calendar" last />
              </div>
              <span className="hidden md:inline-block w-px h-5" style={{background: dividerCol}}></span>
              <UserPicker currentUser={currentUser} onLogout={onLogout} pins={pins} emojis={emojis} onSetPin={onSetPin} onSetEmoji={onSetEmoji} onResetPin={onResetPin} />
            </div>
          </div>
        </header>
      );
    }

    function Stat({ label, value, highlight, danger }) {
      const valColor = danger ? 'var(--ink)' : highlight ? 'var(--ink)' : 'var(--ink-soft)';
      return (
        <div className="flex items-baseline gap-2">
          <span className="tracking-[0.2em] uppercase font-light" style={{fontSize:'10px', color: danger ? '#a83247' : 'var(--text-muted)'}}>{label}</span>
          <span className="text-base tabular-nums font-light" style={{color: danger ? '#a83247' : valColor}}>{value}</span>
        </div>
      );
    }

    function UserPicker({ currentUser, onLogout, pins, emojis, onSetPin, onSetEmoji, onResetPin }) {
      const [open, setOpen] = useState(false);
      const [showPwModal, setShowPwModal] = useState(false);
      const [showAdmin, setShowAdmin] = useState(false);
      const [showEmojiModal, setShowEmojiModal] = useState(false);
      const me = memberById(currentUser);
      const myEmoji = emojis?.[currentUser] || '';
      const isAdmin = currentUser === 'lee_dh';
      useEffect(() => {
        if (!open) return;
        const close = () => setOpen(false);
        window.addEventListener('click', close);
        return () => window.removeEventListener('click', close);
      }, [open]);
      return (
        <>
          <div className="relative" onClick={(e) => e.stopPropagation()}>
            <button onClick={() => setOpen(o => !o)}

    function ChangePinModal({ memberId, currentPin, onSave, onClose }) {
      const [oldPin, setOldPin] = useState('');
      const [newPin, setNewPin] = useState('');
      const [confirm, setConfirm] = useState('');
      const [err, setErr] = useState('');
      const submit = (e) => {
        e.preventDefault();
        if (oldPin !== currentPin) { setErr('нҳ„мһ¬ л№„л°ҖлІҲнҳёк°Җ лӢӨлҰ…лӢҲлӢӨ'); return; }
        if (newPin.length !== 4) { setErr('мғҲ л№„л°ҖлІҲнҳёлҠ” 4мһҗлҰ¬м—¬м•ј н•©лӢҲлӢӨ'); return; }
        if (newPin !== confirm) { setErr('мғҲ л№„л°ҖлІҲнҳёк°Җ мқјм№ҳн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ'); return; }
        onSave(newPin);
      };
      const inputCls = "w-full rounded-sm px-3 py-2 text-base tracking-[0.4em] outline-none transition tabular-nums text-center";
      const inputStyle = { background:'var(--surface)', border:'1px solid var(--border-strong)', color:'var(--ink)' };
      return (
        <Modal onClose={onClose}>
          <div className="px-8 py-6" style={{borderBottom:'1px solid var(--border)'}}>
            <div className="text-[10px] tracking-[0.3em] uppercase mb-1.5 font-eyebrow" style={{color:'var(--text-faint)'}}>Change Password</div>
            <h2 className="font-display text-2xl tracking-tight" style={{color:'var(--ink)'}}>л№„л°ҖлІҲнҳё ліҖкІҪ</h2>
          </div>
          <form onSubmit={submit} className="px-8 py-6 space-y-5">
            <div>
              <label className="text-[10px] tracking-[0.2em] uppercase mb-1.5 block" style={{color:'var(--text-muted)'}}>нҳ„мһ¬ л№„л°ҖлІҲнҳё</label>
              <input type="password" inputMode="numeric" maxLength={4} value={oldPin}
                     onChange={(e) => { setErr(''); setOldPin(e.target.value.replace(/[^0-9]/g,'').slice(0,4)); }}
                     className={inputCls} style={inputStyle} autoFocus />
            </div>
            <div>
              <label className="text-[10px] tracking-[0.2em] uppercase mb-1.5 block" style={{color:'var(--text-muted)'}}>мғҲ л№„л°ҖлІҲнҳё (4мһҗлҰ¬)</label>
              <input type="password" inputMode="numeric" maxLength={4} value={newPin}
                     onChange={(e) => { setErr(''); setNewPin(e.target.value.replace(/[^0-9]/g,'').slice(0,4)); }}
                     className={inputCls} style={inputStyle} />
            </div>
            <div>
              <label className="text-[10px] tracking-[0.2em] uppercase mb-1.5 block" style={{color:'var(--text-muted)'}}>мғҲ л№„л°ҖлІҲнҳё нҷ•мқё</label>
              <input type="password" inputMode="numeric" maxLength={4} value={confirm}
                     onChange={(e) => { setErr(''); setConfirm(e.target.value.replace(/[^0-9]/g,'').slice(0,4)); }}
                     className={inputCls} style={inputStyle} />
            </div>
            {err && <p className="text-xs" style={{color:'#a83247'}}>{err}</p>}
            <div className="flex justify-end gap-3 pt-3" style={{borderTop:'1px solid var(--border)'}}>
              <button type="button" onClick={onClose} className="text-sm px-4 py-2" style={{color:'var(--text-muted)'}}>м·ЁмҶҢ</button>
              <button type="submit" className="text-sm px-5 py-2 rounded-sm" style={{background:'var(--ink)', color:'white'}}>ліҖкІҪ</button>
            </div>
          </form>
        </Modal>
      );
    }

    function formatRelativeTime(iso) {
      const d = new Date(iso);
      const diff = Date.now() - d.getTime();
      const sec = Math.floor(diff / 1000);
      if (sec < 60) return 'л°©кёҲ';
      const min = Math.floor(sec / 60);
      if (min < 60) return min + 'л¶„ м „';
      const hr = Math.floor(min / 60);
      if (hr < 24) return hr + 'мӢңк°„ м „';
      const day = Math.floor(hr / 24);
      if (day < 7) return day + 'мқј м „';
      return (d.getMonth() + 1) + '/' + d.getDate();
    }

                      <span className="text-[10px] tracking-wide px-1.5 py-0.5 rounded-sm ml-0.5"
                            style={{background:'rgba(37,99,235,0.1)', color:'#2563eb', fontWeight:500}}>
                        @л©ҳм…ҳ
                      </span>
                    )}
                  </div>
                  <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                    <span className="text-[10px] tracking-wide" style={{color:'var(--text-faint)'}}>{when}</span>
                    {post.updatedAt && post.updatedAt !== post.createdAt && (
                      <span className="text-[10px] tracking-wide" style={{color:'var(--text-faint)'}}>В· мҲҳм •лҗЁ</span>
                    )}
                  </div>
                </div>
              </div>
              {canEdit && (
                <div className="flex gap-1 opacity-60 hover:opacity-100 transition flex-shrink-0">
                  {isMine && (
                    <button onClick={startEdit}
                            className="p-1 transition" style={{color:'var(--text-muted)'}}
                            onMouseEnter={(e)=>e.currentTarget.style.color='var(--ink)'}
                            onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}
                            title="мҲҳм •">
                      <Edit3 size={13} strokeWidth={1.5} />
                    </button>
                  )}
                  <button onClick={() => { if (confirm('кІҢмӢңкёҖмқ„ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?')) onDelete(post.id); }}
                          className="p-1 transition" style={{color:'var(--text-muted)'}}
                          onMouseEnter={(e)=>e.currentTarget.style.color='#a83247'}
                          onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}
                          title="мӮӯм ң">
                    <Trash2 size={13} strokeWidth={1.5} />
                  </button>
                </div>
              )}
            </div>
            {editing ? (
              <div>
                <input type="text" value={draftTitle} onChange={(e) => setDraftTitle(e.target.value)}
                  placeholder="м ңлӘ©"
                  className="w-full bg-transparent outline-none"
                  style={{color:'var(--ink)', fontSize:'17px', fontWeight:600, paddingBottom:'6px', borderBottom:'1px solid var(--border)'}} />
                <MentionInput value={draftBody} onChange={setDraftBody} rows={3}
                  className="w-full bg-transparent text-sm outline-none leading-relaxed mt-3"
                  style={{color:'var(--text)', minHeight:'72px'}} />
                <div className="flex justify-end gap-2 mt-2">
                  <button onClick={cancelEdit} className="text-xs px-3 py-1" style={{color:'var(--text-muted)'}}>м·ЁмҶҢ</button>
                  <button onClick={saveEdit} disabled={!draftTitle.trim() && !draftBody.trim()}
                          className="text-xs px-3 py-1 rounded-sm disabled:opacity-30"
                          style={{background:'var(--ink)', color:'white'}}>м ҖмһҘ</button>
                </div>
              </div>
            ) : (
              <div>
                {post.title && (
                  <h3 className="mb-1.5" style={{color:'var(--ink)', fontSize:'17px', fontWeight:600, lineHeight:1.35}}>
                    {post.title}
                  </h3>
                )}
                {post.body && (
                  <p className="text-sm leading-relaxed" style={{color:'var(--text)'}}>
                    <RichText text={post.body} />
                  </p>
                )}
              </div>
            )}
            <div className="mt-3.5 flex items-center gap-3">
              <button onClick={() => setExpanded(e => !e)}
                      className="text-sm transition flex items-center gap-2 px-3 py-1.5 rounded-md"
                      style={{
                        color: expanded ? 'var(--ink)' : commentCount > 0 ? 'var(--ink)' : 'var(--text-muted)',
                        background: expanded ? 'var(--surface-2)' : 'transparent',
                        border: '1px solid ' + (expanded ? 'var(--border-strong)' : 'var(--border)'),
                        fontWeight: commentCount > 0 ? 500 : 400,
                      }}
                      onMouseEnter={(e) => { if (!expanded) { e.currentTarget.style.background = 'var(--surface-2)'; e.currentTarget.style.borderColor = 'var(--border-strong)'; } }}
                      onMouseLeave={(e) => { if (!expanded) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = 'var(--border)'; } }}>
                <span style={{fontSize:'15px'}}>рҹ’¬</span>
                {commentCount > 0 ? 'лҢ“кёҖ ' + commentCount : 'лҢ“кёҖ'}
              </button>
            </div>
          </div>
          {expanded && (
            <div style={{borderTop:'1px solid var(--border)'}}>
              <CommentThread task={post} currentUser={currentUser}
                             onAddComment={onAddComment} onDeleteComment={onDeleteComment} />
            </div>
          )}
        </li>
      );
    }

    // ===== Calendar (KST) =====
    const KST_OFFSET_MS = 9 * 60 * 60 * 1000;
    function todayKSTDate() {
      const now = new Date();
      const k = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + KST_OFFSET_MS);
      return new Date(k.getFullYear(), k.getMonth(), k.getDate());
    }
    function ymd(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + dd;
    }
    function parseYMD(s) {
      if (!s) return null;
      const [y, m, d] = s.split('-').map(Number);
      return new Date(y, m - 1, d);
    }
    function addDays(d, n) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate() + n);
    }
    function isSameDay(a, b) {
      return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    // Calendar event categories (label + color, fixed pairing)
    const EVENT_CATEGORIES = {
      annual:    { label: 'м—°м°Ё',    bg: '#eab308', soft: 'rgba(234,179,8,0.15)',  text: '#854d0e' },  // л…ёлһ‘
      biztrip:   { label: 'м¶ңмһҘ',    bg: '#16a34a', soft: 'rgba(22,163,74,0.15)',  text: '#15803d' },  // мҙҲлЎқ
      hqvisit:   { label: 'ліёмӮ¬лӮҙл°©', bg: '#2563eb', soft: 'rgba(37,99,235,0.15)', text: '#1d4ed8' },  // нҢҢлһ‘
      meeting:   { label: 'лҜёнҢ…',    bg: '#7c3aed', soft: 'rgba(124,58,237,0.15)', text: '#6d28d9' },  // л°”мқҙмҳ¬л ӣ
      etc:       { label: 'кё°нғҖ',    bg: '#475569', soft: 'rgba(71,85,105,0.15)',  text: '#334155' },  // мҠ¬л ҲмқҙнҠё
    };
    const CATEGORY_KEYS = Object.keys(EVENT_CATEGORIES);
    // Migrate legacy color keys to category keys
    const LEGACY_COLOR_TO_CATEGORY = {
      blue: 'hqvisit', teal: 'biztrip', violet: 'meeting',
      amber: 'annual', rose: 'etc',     slate: 'etc',
    };
    function getCategory(ev) {
      const key = ev.category || LEGACY_COLOR_TO_CATEGORY[ev.color] || 'etc';
      return { key, ...EVENT_CATEGORIES[key] };
    }

    const KO_MONTHS = ['1мӣ”','2мӣ”','3мӣ”','4мӣ”','5мӣ”','6мӣ”','7мӣ”','8мӣ”','9мӣ”','10мӣ”','11мӣ”','12мӣ”'];
    const KO_WEEKDAYS = ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];

    function CalendarView({ events, currentUser, emojis, onAdd, onUpdate, onDelete }) {
      const [cursor, setCursor] = useState(() => {
        const t = todayKSTDate();
        return new Date(t.getFullYear(), t.getMonth(), 1);
      });
      const [selectedDate, setSelectedDate] = useState(() => todayKSTDate());
      const [editingEvent, setEditingEvent] = useState(null);
      const [creatingForDate, setCreatingForDate] = useState(null);

      const today = todayKSTDate();

      // Build the 6-week grid
      const grid = useMemo(() => {
        const firstOfMonth = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
        const startOffset = firstOfMonth.getDay(); // Sunday-based
        const gridStart = addDays(firstOfMonth, -startOffset);
        const cells = [];
        for (let i = 0; i < 42; i++) cells.push(addDays(gridStart, i));
        return cells;
      }, [cursor]);

      // Per-week event spans for grid drawing.
      // For each of 6 weeks, we compute "spans" вҖ” multi-day events laid out across columns вҖ”
      // and "singles" вҖ” single-day timed events shown as a dot+title row.
      const MAX_ROWS_PER_DAY = 3;
      const weekLayouts = useMemo(() => {
        const weeks = [];
        for (let w = 0; w < 6; w++) {
          const weekStart = grid[w * 7];                // Sunday
          const weekEnd = grid[w * 7 + 6];              // Saturday
          // Find every event that overlaps this week
          const overlapping = events.filter(ev => {
            const s = parseYMD(ev.date);
            const e = parseYMD(ev.endDate || ev.date) || s;
            if (!s) return false;
            return e >= weekStart && s <= weekEnd;
          });
          // For multi-day events: expand to a span object
          const spans = [];
          const singles = {}; // dayIdx -> [ev,...]
          overlapping.forEach(ev => {
            const s = parseYMD(ev.date);
            const e = parseYMD(ev.endDate || ev.date) || s;
            const isMulti = !isSameDay(s, e);
            const isAllDay = ev.allDay;
            // Treat any multi-day event as a span; treat single-day all-day events also as spans
            if (isMulti || isAllDay) {
              const startCol = Math.max(0, Math.floor((s - weekStart) / 86400000));
              const endCol = Math.min(6, Math.floor((e - weekStart) / 86400000));
              spans.push({
                ev,
                startCol,
                endCol,
                continuesLeft: s < weekStart,
                continuesRight: e > weekEnd,
              });
            } else {
              const dayIdx = Math.floor((s - weekStart) / 86400000);
              if (dayIdx < 0 || dayIdx > 6) return;
              (singles[dayIdx] = singles[dayIdx] || []).push(ev);
            }
          });
          // Sort singles by start time
          Object.values(singles).forEach(list => list.sort((a, b) => (a.startTime || '').localeCompare(b.startTime || '')));
          // Place spans into rows greedily (each row is one horizontal track)
          spans.sort((a, b) => {
            // longer spans first, then earlier start
            const lenA = a.endCol - a.startCol;
            const lenB = b.endCol - b.startCol;
            if (lenA !== lenB) return lenB - lenA;
            return a.startCol - b.startCol;
          });
          const rows = []; // rows[i] = array of {startCol,endCol,...}
          spans.forEach(sp => {
            for (let i = 0; i < rows.length; i++) {
              const fits = rows[i].every(existing => existing.endCol < sp.startCol || existing.startCol > sp.endCol);
              if (fits) { rows[i].push(sp); sp.row = i; return; }
            }
            sp.row = rows.length;
            rows.push([sp]);
          });
          weeks.push({ weekStart, weekEnd, spans, singles, rowCount: rows.length });
        }
        return weeks;
      }, [grid, events]);

      // Helper for per-day click detail (used by selected day list)
      const eventsByDate = useMemo(() => {
        const map = {};
        events.forEach(ev => {
          const start = parseYMD(ev.date);
          const end = parseYMD(ev.endDate || ev.date) || start;
          if (!start) return;
          let d = new Date(start);
          while (d <= end) {
            const key = ymd(d);
            (map[key] = map[key] || []).push(ev);
            d = addDays(d, 1);
          }
        });
        Object.values(map).forEach(list => list.sort((a, b) => {
          if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
          return (a.startTime || '').localeCompare(b.startTime || '');
        }));
        return map;
      }, [events]);

      const monthEventCount = useMemo(() => {
        let count = 0;
        const monthStr = cursor.getFullYear() + '-' + String(cursor.getMonth() + 1).padStart(2, '0');
        events.forEach(ev => {
          if ((ev.date || '').startsWith(monthStr)) count++;
        });
        return count;
      }, [events, cursor]);

      const selectedKey = ymd(selectedDate);
      const selectedEvents = eventsByDate[selectedKey] || [];

      const goPrev = () => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1));
      const goNext = () => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1));
      const goToday = () => {
        const t = todayKSTDate();
        setCursor(new Date(t.getFullYear(), t.getMonth(), 1));
        setSelectedDate(t);
      };

      const openCreate = (dateStr) => setCreatingForDate(dateStr || ymd(selectedDate));

      return (
        <div className="rounded-md overflow-hidden" style={{background:'var(--surface)', border:'1px solid var(--border)'}}>
          {/* Toolbar */}
          <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:'1px solid var(--border)'}}>
            <div className="flex items-baseline gap-3">
              <h3 className="font-display tracking-tight" style={{fontSize:'22px', color:'var(--ink)', fontWeight:500}}>
                {cursor.getFullYear()}л…„ {KO_MONTHS[cursor.getMonth()]}
              </h3>
              <span className="text-xs tabular-nums" style={{color:'var(--text-faint)'}}>{monthEventCount}кұҙ</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="inline-flex items-center rounded-md overflow-hidden" style={{border:'1px solid var(--border)'}}>
                <button onClick={goPrev}
                        className="px-2.5 py-1.5 transition"
                        style={{color:'var(--text-muted)'}}
                        onMouseEnter={(e)=>{e.currentTarget.style.background='var(--surface-2)';e.currentTarget.style.color='var(--ink)';}}
                        onMouseLeave={(e)=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--text-muted)';}}
                        title="мқҙм „ лӢ¬">
                  <ChevronLeft size={15} strokeWidth={1.7} />
                </button>
                <button onClick={goToday}
                        className="text-xs px-3 py-1.5 transition tracking-wide"
                        style={{color:'var(--ink)', background:'transparent', borderLeft:'1px solid var(--border)', borderRight:'1px solid var(--border)', fontWeight:500}}
                        onMouseEnter={(e)=>e.currentTarget.style.background='var(--surface-2)'}
                        onMouseLeave={(e)=>e.currentTarget.style.background='transparent'}>
                  мҳӨлҠҳ
                </button>
                <button onClick={goNext}
                        className="px-2.5 py-1.5 transition"
                        style={{color:'var(--text-muted)'}}
                        onMouseEnter={(e)=>{e.currentTarget.style.background='var(--surface-2)';e.currentTarget.style.color='var(--ink)';}}
                        onMouseLeave={(e)=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--text-muted)';}}
                        title="лӢӨмқҢ лӢ¬">
                  <ChevronRight size={15} strokeWidth={1.7} />
                </button>
              </div>
              <button onClick={() => openCreate()}
                      className="text-xs px-3.5 py-1.5 rounded-md transition tracking-wide flex items-center gap-1.5"
                      style={{background:'var(--ink)', color:'white', fontWeight:500}}>
                <Plus size={12} strokeWidth={2.2} /> мқјм • м¶”к°Җ
              </button>
            </div>
          </div>

          {/* Weekday header */}
          <div className="grid grid-cols-7" style={{borderBottom:'1px solid var(--border)'}}>
            {KO_WEEKDAYS.map((d, i) => (
              <div key={d} className="text-[11px] tracking-[0.18em] uppercase font-eyebrow text-center py-2.5"
                   style={{color: i === 0 ? '#dc2626' : i === 6 ? '#2563eb' : 'var(--text-muted)'}}>
                {d}
              </div>
            ))}
          </div>

          {/* Calendar grid: 6 weeks, each as a row with absolute-positioned spans */}
          <div style={{borderTop:'1px solid var(--border)'}}>
            {weekLayouts.map((wk, wIdx) => {
              const isLastWeek = wIdx === 5;
              const SPAN_BAND_TOP = 24;     // px from top of cell to start span band
              const SPAN_HEIGHT = 18;       // px per span row
              const SPAN_GAP = 2;
              const visibleSpanRows = Math.min(wk.rowCount, MAX_ROWS_PER_DAY);
              const cellMinHeight = SPAN_BAND_TOP + (visibleSpanRows + 2) * (SPAN_HEIGHT + SPAN_GAP) + 4;
              return (
                <div key={wIdx} className="grid grid-cols-7 relative"
                     style={{
                       borderBottom: isLastWeek ? 'none' : '1px solid var(--border)',
                       minHeight: Math.max(108, cellMinHeight) + 'px',
                     }}>
                  {/* Day cells (background + date number + singles + overflow count) */}
                  {[0,1,2,3,4,5,6].map(col => {
                    const i = wIdx * 7 + col;
                    const d = grid[i];
                    const inMonth = d.getMonth() === cursor.getMonth();
                    const isToday = isSameDay(d, today);
                    const isSelected = isSameDay(d, selectedDate);
                    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                    const isSunday = d.getDay() === 0;
                    const isLastCol = col === 6;
                    const totalForDay = (eventsByDate[ymd(d)] || []).length;
                    const spansAtThisDay = wk.spans.filter(s => s.startCol <= col && s.endCol >= col).length;
                    const singlesHere = wk.singles[col] || [];
                    const remainingRowsForSingles = Math.max(0, MAX_ROWS_PER_DAY - Math.min(wk.rowCount, MAX_ROWS_PER_DAY));
                    const visibleSingles = singlesHere.slice(0, remainingRowsForSingles);
                    const hiddenCount = totalForDay - (Math.min(spansAtThisDay, MAX_ROWS_PER_DAY)) - visibleSingles.length;
                    return (
                      <div key={col}
                           onClick={() => setSelectedDate(d)}
                           onDoubleClick={() => openCreate(ymd(d))}
                           className="text-left relative cursor-pointer transition"
                           style={{
                             padding: '6px 6px 4px 6px',
                             borderRight: isLastCol ? 'none' : '1px solid var(--border)',
                             background: isSelected
                               ? 'rgba(28,37,64,0.04)'
                               : (inMonth ? 'transparent' : 'var(--surface-2)'),
                             opacity: inMonth ? 1 : 0.55,
                           }}
                           onMouseEnter={(e) => { if (!isSelected) e.currentTarget.style.background = 'var(--surface-2)'; }}
                           onMouseLeave={(e) => { if (!isSelected) e.currentTarget.style.background = inMonth ? 'transparent' : 'var(--surface-2)'; }}>
                        <div className="flex items-center justify-between" style={{height:'18px'}}>
                          {isToday ? (
                            <span className="inline-flex items-center justify-center rounded-full tabular-nums"
                                  style={{width:'22px', height:'22px', background:'var(--ink)', color:'white', fontSize:'12px', fontWeight:600}}>
                              {d.getDate()}
                            </span>
                          ) : (
                            <span className="tabular-nums" style={{
                              fontSize: '13px',
                              fontWeight: isSelected ? 600 : 500,
                              color: !inMonth ? 'var(--text-faint)' : isSunday ? '#dc2626' : isWeekend ? '#2563eb' : 'var(--ink)',
                              marginLeft: '2px',
                            }}>
                              {d.getDate()}
                            </span>
                          )}
                        </div>
                        {/* Spacer for span band */}
                        <div style={{
                          height: (Math.min(wk.rowCount, MAX_ROWS_PER_DAY) * (SPAN_HEIGHT + SPAN_GAP)) + 'px',
                        }}></div>
                        {/* Single-day timed events (dot + time + title) */}
                        <div className="space-y-[2px]">
                          {visibleSingles.map(ev => {
                            const c = getCategory(ev);
                            return (
                              <div key={ev.id}
                                   onClick={(e) => { e.stopPropagation(); setEditingEvent(ev); }}
                                   className="truncate cursor-pointer transition"
                                   style={{
                                     color: c.text,
                                     fontSize: '11px',
                                     lineHeight: 1.35,
                                     padding: '1px 4px 1px 8px',
                                     fontWeight: 500,
                                     position: 'relative',
                                   }}>
                                <span style={{position:'absolute', left:'2px', top:'50%', transform:'translateY(-50%)',
                                              width:'4px', height:'4px', background:c.bg, borderRadius:'50%'}}></span>
                                {ev.startTime && <span className="tabular-nums mr-1" style={{opacity:0.85}}>{ev.startTime}</span>}
                                {ev.title || '(м ңлӘ© м—ҶмқҢ)'}
                              </div>
                            );
                          })}
                          {hiddenCount > 0 && (
                            <div style={{fontSize:'10px', color:'var(--text-muted)', padding:'1px 4px', fontWeight:500}}>
                              + {hiddenCount}кұҙ лҚ”ліҙкё°
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                  {/* Multi-day & all-day spans overlaid across columns */}
                  {wk.spans.filter(sp => sp.row < MAX_ROWS_PER_DAY).map((sp, idx) => {
                    const c = getCategory(sp.ev);
                    const colWidth = 100 / 7;
                    const left = sp.startCol * colWidth;
                    const width = (sp.endCol - sp.startCol + 1) * colWidth;
                    const top = SPAN_BAND_TOP + sp.row * (SPAN_HEIGHT + SPAN_GAP);
                    const radiusLeft = sp.continuesLeft ? '0' : '3px';
                    const radiusRight = sp.continuesRight ? '0' : '3px';
                    return (
                      <div key={sp.ev.id + '-' + idx}
                           onClick={(e) => { e.stopPropagation(); setEditingEvent(sp.ev); }}
                           className="absolute truncate cursor-pointer transition"
                           style={{
                             left: 'calc(' + left + '% + 3px)',
                             width: 'calc(' + width + '% - 6px)',
                             top: top + 'px',
                             height: SPAN_HEIGHT + 'px',
                             background: c.bg,
                             color: 'white',
                             fontSize: '11px',
                             lineHeight: SPAN_HEIGHT + 'px',
                             padding: '0 8px',
                             fontWeight: 500,
                             borderRadius: radiusLeft + ' ' + radiusRight + ' ' + radiusRight + ' ' + radiusLeft,
                             zIndex: 1,
                           }}>
                        {sp.continuesLeft && 'вҖ№ '}
                        <span style={{opacity:0.9, marginRight:'4px'}}>{c.label}</span>
                        {sp.ev.title || '(м ңлӘ© м—ҶмқҢ)'}
                        {sp.continuesRight && ' вҖә'}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>

          {/* Selected day detail */}
          <div className="px-5 py-4" style={{borderTop:'1px solid var(--border)', background:'var(--surface-2)'}}>
            <div className="flex items-center justify-between mb-3">
              <div>
                <div className="text-[10px] tracking-[0.2em] uppercase font-eyebrow" style={{color:'var(--text-faint)'}}>
                  Selected В· {KO_WEEKDAYS[selectedDate.getDay()]}мҡ”мқј
                </div>
                <div className="font-display tracking-tight mt-0.5" style={{fontSize:'18px', color:'var(--ink)', fontWeight:500}}>
                  {selectedDate.getMonth() + 1}мӣ” {selectedDate.getDate()}мқј
                </div>
              </div>
              <button onClick={() => openCreate()}
                      className="text-xs px-3 py-1.5 rounded-md transition tracking-wide flex items-center gap-1.5"
                      style={{background:'transparent', color:'var(--ink)', border:'1px solid var(--ink)', fontWeight:500}}
                      onMouseEnter={(e)=>{e.currentTarget.style.background='var(--ink)';e.currentTarget.style.color='white';}}
                      onMouseLeave={(e)=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--ink)';}}>
                <Plus size={11} strokeWidth={2.2} /> мқјм • м¶”к°Җ
              </button>
            </div>
            {selectedEvents.length === 0 ? (
              <div className="text-sm py-3" style={{color:'var(--text-muted)'}}>

    function BrandModal({ brandId, tasks, onClose, onAdd, onChangeStatus, onDelete, onEdit, currentUser, onAddComment, onDeleteComment }) {
      const brand = brandById(brandId);
      const [showForm, setShowForm] = useState(tasks.length === 0);
      const sorted = [...tasks].sort((a, b) => {
        if ((a.status === 'done') !== (b.status === 'done')) return a.status === 'done' ? 1 : -1;
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return b.createdAt.localeCompare(a.createdAt);
      });
      return (
        <Modal onClose={onClose}>
          <div className="flex items-center justify-between px-8 py-6" style={{borderBottom:'1px solid var(--border)'}}>
            <div>
              <div className="flex items-center gap-2 text-[10px] tracking-[0.3em] uppercase mb-1.5 font-eyebrow" style={{color:'var(--text-faint)'}}>

              <div className="flex items-center gap-3">
                <h2 className="font-display text-3xl tracking-tight" style={{color:'var(--ink)'}}>
                  {brand.name}
                </h2>
                


              </div>
            </div>
            <button onClick={onClose} className="transition" style={{color:'var(--text-muted)'}}
                    onMouseEnter={(e)=>e.currentTarget.style.color='var(--ink)'}
                    onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}>

          <div className="px-8 py-6 overflow-y-auto" style={{ maxHeight: '60vh' }}>
            {sorted.length === 0 && !showForm && (
              <div className="text-center py-12">
                <p className="text-sm mb-4" style={{color:'var(--text-muted)'}}>л“ұлЎқлҗң мһ‘м—…мқҙ м—ҶмҠөлӢҲлӢӨ</p>
                <button
                  onClick={() => setShowForm(true)}
                  className="text-xs px-5 py-2.5 rounded-full transition tracking-wide"
                  style={{background:'var(--ink)', color:'white'}}
                >
                  + мІ« мһ‘м—… м¶”к°Җ
                </button>

            )}
            {sorted.length > 0 && (
              <ul className="space-y-2 mb-6">
                {sorted.map(t => (

            ) : (

    // Rich contentEditable editor with @-mention autocomplete.
    // Internal value format remains "@[мқҙлҰ„](id)" for storage compatibility.
    // Mentions are rendered as styled chips inline as the user types.
    function MentionInput({ value, onChange, placeholder, rows = 3, autoFocus, className = '', style = {} }) {
      const ref = useRef(null);
      const [popup, setPopup] = useState(null); // { query, idx }
      useEffect(() => { if (autoFocus && ref.current) { ref.current.focus(); } }, []);

      // Convert internal format -> HTML for display
      const escape = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const toHTML = (txt) => {
        if (!txt) return '';
        const parts = txt.split(/(@\[[^\]]+\]\([a-z_]+\))/g);
        return parts.map(p => {
          const mm = p.match(/^@\[([^\]]+)\]\(([a-z_]+)\)$/);
          if (mm) {
            return `<span class="mention-chip" contenteditable="false" data-mention-id="${mm[2]}">@${escape(mm[1])}</span>`;
          }
          return escape(p).replace(/\n/g, '<br>');
        }).join('');
      };

      // Convert DOM -> internal format
      const fromDOM = (el) => {
        let out = '';
        const walk = (node) => {
          if (node.nodeType === 3) { out += node.nodeValue; return; }
          if (node.nodeType !== 1) return;
          if (node.classList && node.classList.contains('mention-chip')) {
            const id = node.getAttribute('data-mention-id');
            const name = (node.textContent || '').replace(/^@/, '');
            out += `@[${name}](${id})`;
            return;
          }
          if (node.tagName === 'BR') { out += '\n'; return; }
          if (node.tagName === 'DIV' || node.tagName === 'P') {
            if (out && !out.endsWith('\n')) out += '\n';
            node.childNodes.forEach(walk);
            return;
          }
          node.childNodes.forEach(walk);
        };
        el.childNodes.forEach(walk);
        return out;
      };

      // Initialize / sync DOM when external value changes (only if differs from current)
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const current = fromDOM(el);
        if (current !== (value || '')) {
          el.innerHTML = toHTML(value || '');
        }
        // eslint-disable-next-line
      }, [value]);

      // After every input, save selection, recompute, write back, restore selection
      const handleInput = () => {
        const el = ref.current; if (!el) return;
        const txt = fromDOM(el);
        onChange(txt);
        // Recompute mention popup state from current caret position
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) { setPopup(null); return; }
        const range = sel.getRangeAt(0);
        if (!el.contains(range.startContainer)) { setPopup(null); return; }
        // Look at text in current text node up to caret
        const node = range.startContainer;
        if (node.nodeType !== 3) { setPopup(null); return; }
        const before = node.nodeValue.slice(0, range.startOffset);
        const m = before.match(/@([\u3131-\uD79D\wк°Җ-нһЈ]*)$/);
        if (!m) { setPopup(null); return; }
        setPopup({ query: m[1] || '', idx: 0 });
      };

      const GROUP_MENTION = { id: '_all_', name: 'BMл¶Җ', role: 'м „мӣҗ л©ҳм…ҳ', isGroup: true };
      const filtered = popup ? (() => {
        const q = (popup.query || '').toLowerCase();
        const groupMatches = !q || 'bmл¶Җ'.includes(q) || 'bm'.includes(q) || 'all'.includes(q) || 'л¶Җм„ң'.includes(q) || 'м „мӣҗ'.includes(q) || 'BMл¶Җ'.includes(popup.query) || 'л№„м— '.includes(q);
        const members = MEMBERS.filter(mm => {
          if (!q) return true;
          return mm.name.toLowerCase().includes(q) || mm.id.toLowerCase().includes(q);
        });
        const list = groupMatches ? [GROUP_MENTION, ...members] : members;
        return list.slice(0, 10);
      })() : [];

      const insertMention = (member) => {
        const el = ref.current; if (!el) return;
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return;
        const range = sel.getRangeAt(0);
        const node = range.startContainer;
        if (node.nodeType !== 3) return;

        // Replace the "@query" with chip + space
        const before = node.nodeValue.slice(0, range.startOffset);
        const after = node.nodeValue.slice(range.startOffset);
        const m = before.match(/@([\u3131-\uD79D\wк°Җ-нһЈ]*)$/);
        if (!m) return;
        const newBefore = before.slice(0, before.length - m[0].length);

        const parent = node.parentNode;
        const beforeNode = document.createTextNode(newBefore);
        const chip = document.createElement('span');
        chip.className = 'mention-chip';
        chip.setAttribute('contenteditable', 'false');
        chip.setAttribute('data-mention-id', member.id);
        chip.textContent = `@${member.name}`;
        const spaceNode = document.createTextNode('\u00A0');
        const afterNode = document.createTextNode(after);

        parent.insertBefore(beforeNode, node);
        parent.insertBefore(chip, node);
        parent.insertBefore(spaceNode, node);
        parent.insertBefore(afterNode, node);
        parent.removeChild(node);

        // Caret after the space
        const r = document.createRange();
        r.setStart(spaceNode, 1);
        r.collapse(true);
        sel.removeAllRanges();
        sel.addRange(r);

        setPopup(null);
        // Trigger onChange with updated value
        onChange(fromDOM(ref.current));
      };

      const onKeyDown = (e) => {
        if (e.isComposing || e.keyCode === 229) return;
        if (popup && filtered.length > 0) {
          if (e.key === 'ArrowDown') { e.preventDefault(); setPopup(p => ({...p, idx: (p.idx + 1) % filtered.length})); return; }
          if (e.key === 'ArrowUp')   { e.preventDefault(); setPopup(p => ({...p, idx: (p.idx - 1 + filtered.length) % filtered.length})); return; }
          if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); insertMention(filtered[popup.idx]); return; }
          if (e.key === 'Escape') { setPopup(null); return; }
        }
      };

      // Plain-text paste
      const onPaste = (e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text/plain');
        document.execCommand('insertText', false, text);
      };

      return (
        <div className="relative">
          <div
            ref={ref}
            contentEditable
            suppressContentEditableWarning
            onInput={handleInput}
            onKeyDown={onKeyDown}
            onPaste={onPaste}
            onBlur={() => setTimeout(() => setPopup(null), 150)}
            data-placeholder={placeholder}
            autoFocus={autoFocus}
            className={`rich-input ${className}`}
            style={{ minHeight: rows ? (rows * 1.5 + 0.4) + 'em' : 'auto', ...style }}
          />
          {popup && filtered.length > 0 && (
            <div className="mention-popup" style={{top: '100%', left: 0, marginTop: '2px'}}>
              {filtered.map((m, i) => (
                <button key={m.id} type="button"
                        className={`mention-popup-item ${i === popup.idx ? 'active' : ''}`}
                        onMouseDown={(e) => { e.preventDefault(); insertMention(m); }}>
                  <span style={{flex:1, color:'#2563eb', fontWeight:500}}>@{m.name}</span>
                  <span className="mention-popup-meta">{m.role}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    function CommentThread({ task, currentUser, onAddComment, onDeleteComment }) {

              rows={2}
              className="w-full bg-transparent text-xs px-3 py-2 outline-none resize-none leading-relaxed"
              style={{color:'var(--text)', minHeight:'52px'}}

            <div className="flex items-center justify-between px-3 py-1.5" style={{borderTop:'1px solid var(--border)'}}>
              <span className="text-[10px] tracking-wide" style={{color:'var(--text-faint)'}}>

                      style={{background:'var(--ink)', color:'white'}}>
