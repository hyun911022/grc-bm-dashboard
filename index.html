            return (
              <button key={s.id}
                      onClick={handler}
                      disabled={!canEdit}
                      title={canEdit ? s.label : `${s.label} (лӢҙлӢ№мһҗл§Ң ліҖкІҪ)`}
                      className="text-[10px] tracking-wide px-2 py-0.5 rounded-sm transition"
                      style={{
                        border: '1px solid ' + (active ? s.border : 'var(--border)'),
                        background: active ? s.bg : 'transparent',
                        color: active ? s.fg : 'var(--text-faint)',
                        fontWeight: active ? 500 : 400,
                        cursor: canEdit ? (active ? 'default' : 'pointer') : 'not-allowed',
                        opacity: !canEdit && !active ? 0.5 : 1,
                      }}>
                {s.label}
              </button>
            );
          })}
        </div>
      );
    }

    function TaskRow({ task, showBrand, onChangeStatus, onEdit, onDelete, currentUser, onAddComment, onDeleteComment }) {
      const s = statusOf(task.status);
      const p = priorityOf(task.priority);
      const assignees = (task.assigneeIds || (task.assigneeId ? [task.assigneeId] : [])).map(memberById).filter(Boolean);
      const b = brandById(task.brandId);
      const days = task.dueDate ? daysUntil(task.dueDate) : null;
      const isDone = task.status === 'done';
      const StatusIcon = s.icon;
      const [expanded, setExpanded] = useState(false);
      const assigneeIds_ = task.assigneeIds || (task.assigneeId ? [task.assigneeId] : []);
      const isAssignee = assigneeIds_.includes(currentUser);
      const isAuthor = task.createdBy === currentUser;
      const canEditTask = isAssignee || isAuthor || currentUser === 'lee_dh';
      const commentCount = (task.comments || []).length;
      const descMentions = extractMentionIds(task.description || '');
      const cmtMentions = extractMentionIds((task.comments || []).map(c => c.body).join(' '));
      const hasMentionedMe = currentUser && (descMentions.includes(currentUser) || cmtMentions.includes(currentUser));
      return (
        <li className="rounded-sm transition"
            style={{
              background:'var(--surface)',
              border:'1px solid ' + (hasMentionedMe ? '#c9a961' : 'var(--border)'),
              opacity: isDone ? 0.55 : 1
            }}>
          <div className="group flex items-start gap-3 p-3">
            <div className="mt-0.5 flex-shrink-0" title={`мғҒнғң: ${s.label}`}>
              <StatusIcon size={16} strokeWidth={1.6} className={s.cls} />
            </div>
            <div className="flex-1 min-w-0 cursor-pointer" onClick={() => setExpanded(e => !e)}>
              <div className="flex items-center gap-2 mb-1 flex-wrap">
                {showBrand && (b || task.brandId === '__all__') && (
                  <span className="text-[10px] px-1.5 py-0.5 rounded-sm tracking-wider"
                        style={{background:'var(--surface-2)', color:'var(--ink-soft)', border:'1px solid var(--border)'}}>
                    {b ? b.name.split('/')[0] : 'м „мӮ¬ кіөмҡ©'}
                  </span>
                )}
                <span className="text-sm flex items-center gap-1.5" style={{color: isDone ? 'var(--text-faint)' : 'var(--ink)', textDecoration: isDone ? 'line-through' : 'none'}}>
                  {task.private && (
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#a37800" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
                      <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                  )}
                  {task.title}
                </span>
                {task.priority === 'high' && (
                  <span className={`text-[9px] px-1.5 py-0.5 rounded-sm border tracking-wider ${p.cls}`}>{p.label}</span>
                )}
                {hasMentionedMe && (
                  <span className="text-[9px] px-1.5 py-0.5 rounded-sm tracking-wider"
                        style={{background:'rgba(201,169,97,0.15)', color:'#a37800', border:'1px solid #d6c08a'}}>
                    @л©ҳм…ҳ
                  </span>
                )}
              </div>
              {task.description && (
                <p className="text-xs mt-1 leading-relaxed" style={{color:'var(--text-muted)'}}>
                  <RichText text={task.description} />
                </p>
              )}
              <div className="flex items-center gap-3 mt-1.5 text-[10px] tracking-wide flex-wrap" style={{color:'var(--text-muted)'}}>
                <StatusButtons task={task} currentStatus={task.status}
                  canEdit={isAssignee || currentUser === 'lee_dh'}
                  onChange={(next) => onChangeStatus && onChangeStatus(task.id, next)} />
                {assignees.length > 0 && (
                  <span className="flex items-center gap-1">
                    <UsersI size={9} strokeWidth={1.5} />
                    {assignees.length === 1
                      ? `${assignees[0].name} ${assignees[0].title}`
                      : assignees.length === 2
                        ? `${assignees[0].name} В· ${assignees[1].name}`
                        : `${assignees[0].name} мҷё ${assignees.length - 1}лӘ…`}
                  </span>
                )}
                {task.dueDate && (
                  <span className="flex items-center gap-1 tabular-nums"
                        style={{color: isDone ? 'var(--text-faint)' : days < 0 ? '#a83247' : days <= 3 ? '#a37800' : 'var(--text-muted)'}}>
                    <CalendarI size={9} strokeWidth={1.5} />
                    {fmtDate(task.dueDate)}
                    {!isDone && days !== null && (
                      <span className="ml-0.5">({days < 0 ? `${Math.abs(days)}мқј м§Җм—°` : days === 0 ? 'мҳӨлҠҳ' : `D-${days}`})</span>
                    )}
                  </span>
                )}
                <span className="flex items-center gap-1 transition hover:text-zinc-700"
                      style={{color: commentCount > 0 ? 'var(--ink-soft)' : 'var(--text-faint)'}}>
                  рҹ’¬ {commentCount}
                </span>
              </div>
            </div>
            {canEditTask && (
              <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition flex-shrink-0">
                <button onClick={onEdit} className="p-1 transition" style={{color:'var(--text-muted)'}}
                        onMouseEnter={(e)=>e.currentTarget.style.color='var(--ink)'}
                        onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}
                        title="мҲҳм •">
                  <Edit3 size={13} strokeWidth={1.5} />
                </button>
                <button onClick={onDelete} className="p-1 transition" style={{color:'var(--text-muted)'}}
                        onMouseEnter={(e)=>e.currentTarget.style.color='#a83247'}
                        onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}
                        title="мӮӯм ң">
                  <Trash2 size={13} strokeWidth={1.5} />
                </button>
              </div>
            )}
          </div>
          {expanded && onAddComment && (
            <div style={{borderTop: '1px solid var(--border)'}}>
              <CommentThread task={task} currentUser={currentUser}
                             onAddComment={onAddComment} onDeleteComment={onDeleteComment} />
            </div>
          )}
        </li>
      );
    }

    /* ============================================================
       INLINE TASK FORM
       ============================================================ */
    function InlineTaskForm({ brandId, onSubmit, onCancel }) {
      const [title, setTitle] = useState('');
      const [description, setDescription] = useState('');
      const [assigneeIds, setAssigneeIds] = useState([]);
      const [dueDate, setDueDate] = useState('');
      const [priority, setPriority] = useState('normal');
      const submit = (e) => {
        e.preventDefault();
        if (!title.trim() || assigneeIds.length === 0) return;
        onSubmit({ brandId, title: title.trim(), description: description.trim(), assigneeIds, dueDate, priority, status: 'pending' });
      };
      return (
        <form onSubmit={submit} className="rounded-sm p-4 space-y-3"
              style={{border:'1px solid var(--border)', background:'var(--surface-2)'}}>
          <input type="text" placeholder="мһ‘м—… м ңлӘ© *" value={title} onChange={e => setTitle(e.target.value)} autoFocus
                 className="w-full bg-transparent text-sm py-2 outline-none transition"
                 style={{color:'var(--ink)', borderBottom:'1px solid var(--border-strong)'}} />
          <MentionInput
            value={description}
            onChange={setDescription}
            placeholder="м„ёл¶Җ лӮҙмҡ© (м„ нғқ, @лЎң л©ӨлІ„ л©ҳм…ҳ)"
            rows={2}
            className="w-full bg-transparent text-xs py-2 outline-none resize-none leading-relaxed"
            style={{color:'var(--text)', borderBottom:'1px solid var(--border-strong)'}} />
          <FormField label="лӢҙлӢ№мһҗ *">
            <MultiAssigneePicker brandId={brandId} value={assigneeIds} onChange={setAssigneeIds} />
          </FormField>
          <div className="grid grid-cols-2 gap-3">
            <FormField label="л§Ҳк°җ">
              <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                     className="w-full rounded-sm px-2 py-1.5 text-xs outline-none transition"
                     style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}} />
            </FormField>
            <FormField label="мҡ°м„ мҲңмң„">
              <PriorityButtons value={priority} onChange={setPriority} />
            </FormField>
          </div>
          <div className="flex items-center justify-end pt-2 flex-wrap gap-2">
            <div className="flex gap-2">
              <button type="button" onClick={onCancel} className="text-xs px-3 py-1.5 transition" style={{color:'var(--text-muted)'}}>м·ЁмҶҢ</button>
              <button type="submit" disabled={!title.trim() || assigneeIds.length === 0}
                      className="text-xs px-4 py-1.5 rounded-sm transition disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{background:'var(--ink)', color:'white'}}>
                л“ұлЎқ
              </button>
            </div>
          </div>
        </form>
      );
    }

    function FormField({ label, children }) {
      return (
        <div>
          <label className="text-[10px] tracking-[0.2em] uppercase mb-1 block font-eyebrow" style={{color:'var(--text-faint)'}}>{label}</label>
          {children}
        </div>
      );
    }

    function MultiAssigneePicker({ brandId, value, onChange }) {
      const brand = brandId ? brandById(brandId) : null;
      const podMemberIds = brand ? (PARTS.find(p => p.id === brand.part)?.members || []) : [];
      const leadIds = MEMBERS.filter(m => m.group === 'head').map(m => m.id);
      const optionIds = brand ? [...leadIds, ...podMemberIds] : MEMBERS.map(m => m.id);
      const options = optionIds.map(memberById).filter(Boolean);
      const toggle = (id) => {
        if (value.includes(id)) onChange(value.filter(x => x !== id));
        else onChange([...value, id]);
      };
      // Auto-prune assignees not in valid set when brand changes
      useEffect(() => {
        if (!brand) return;
        const valid = new Set(optionIds);
        const next = value.filter(id => valid.has(id));
        if (next.length !== value.length) onChange(next);
        // eslint-disable-next-line
      }, [brandId]);
      return (
        <div>
          {!brand && (
            <p className="text-[10px] mb-1.5" style={{color:'var(--text-faint)'}}>лёҢлһңл“ңлҘј лЁјм Җ м„ нғқн•ҳм„ёмҡ”</p>
          )}
          <div className="flex flex-wrap gap-1.5">
            {options.map(m => {
              const selected = value.includes(m.id);
              const isLead = m.group === 'head';
              return (
                <button key={m.id} type="button" onClick={() => toggle(m.id)}
                        className="text-xs px-2.5 py-1 rounded-full transition tracking-wide flex items-center gap-1"
                        style={{
                          background: selected ? 'var(--ink)' : 'var(--surface)',
                          color: selected ? 'white' : 'var(--text)',
                          border: '1px solid ' + (selected ? 'var(--ink)' : 'var(--border-strong)'),
                        }}>
                  {selected && <span style={{fontSize:'9px'}}>вң“</span>}
                  <span>{m.name}</span>
                  <span style={{opacity: 0.65, fontSize:'11px'}}>{m.title}</span>
                  {isLead && <span style={{opacity:0.5, fontSize:'10px'}}>В·{m.role}</span>}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    /* ============================================================
       FULL TASK FORM MODAL
       ============================================================ */
    function TaskFormModal({ mode, initial, initialBrand, onClose, onSubmit }) {
      const [title, setTitle] = useState(initial?.title || '');
      const [description, setDescription] = useState(initial?.description || '');
      const [brandId, setBrandId] = useState(initial?.brandId || initialBrand || '');
      const [assigneeIds, setAssigneeIds] = useState(initial?.assigneeIds || (initial?.assigneeId ? [initial.assigneeId] : []));
      const [dueDate, setDueDate] = useState(initial?.dueDate || '');
      const [priority, setPriority] = useState(initial?.priority || 'normal');
      const [isPrivate, setIsPrivate] = useState(!!initial?.private);
      const submit = (e) => {
        e.preventDefault();
        if (!title.trim() || !brandId || assigneeIds.length === 0) return;
        onSubmit({
          title: title.trim(), description: description.trim(),
          brandId, assigneeIds, dueDate, priority,
          private: isPrivate,
          status: initial?.status || 'pending',
        });
      };
      return (
        <Modal onClose={onClose}>
          <div className="px-8 py-6" style={{borderBottom:'1px solid var(--border)'}}>
            <div className="text-[10px] tracking-[0.3em] uppercase mb-1.5 font-eyebrow" style={{color:'var(--text-faint)'}}>
              {mode === 'create' ? 'New Task' : 'Edit Task'}
            </div>
            <h2 className="font-display text-2xl tracking-tight" style={{color:'var(--ink)'}}>
              {mode === 'create' ? 'мғҲ мһ‘м—… м¶”к°Җ' : 'мһ‘м—… мҲҳм •'}
            </h2>
          </div>
          <form onSubmit={submit} className="px-8 py-6 space-y-5 overflow-y-auto" style={{ maxHeight: '70vh' }}>
            <FormField label="мһ‘м—… м ңлӘ© *">
              <input type="text" value={title} onChange={e => setTitle(e.target.value)} autoFocus
                     className="w-full bg-transparent text-sm py-2 outline-none transition"
                     style={{color:'var(--ink)', borderBottom:'1px solid var(--border-strong)'}}
                     placeholder="мҳҲ: Q3 лҰ¬лүҙм–ј нҢЁнӮӨм§Җ мӢңм•Ҳ м»ЁнҺҢ" />
            </FormField>
            <FormField label="лёҢлһңл“ң *">
              <select value={brandId} onChange={e => setBrandId(e.target.value)}
                      className="w-full rounded-sm px-3 py-2 text-sm outline-none transition"
                      style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}}>
                <option value="">вҖ” лёҢлһңл“ң м„ нғқ вҖ”</option>
                <option value="__all__">лӘЁл“  лёҢлһңл“ң (м „мӮ¬ кіөмҡ©)</option>
                {(() => {
                  const podLock = (initial?.assigneeIds || []).map(memberById).find(m => m && m.group !== 'head');
                  const podFilter = podLock ? podLock.group : null;
                  return PARTS.filter(p => !podFilter || p.id === podFilter).map(part => (
                    <optgroup key={part.id} label={part.labelKo}>
                      {BRANDS.filter(b => b.part === part.id).map(b => (
                        <option key={b.id} value={b.id}>{b.name.split('/')[0]}</option>
                      ))}
                    </optgroup>
                  ));
                })()}
              </select>
            </FormField>
            <FormField label="м„ёл¶Җ лӮҙмҡ©">
              <MentionInput
                value={description}
                onChange={setDescription}
                placeholder="л°°кІҪ, м»Ён…ҚмҠӨнҠё, кІ°кіјл¬ј нҳ•нғң (@лЎң л©ӨлІ„ л©ҳм…ҳ)"
                rows={3}
                className="w-full rounded-sm px-3 py-2 text-sm outline-none transition leading-relaxed"
                style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}} />
            </FormField>
            <FormField label="лӢҙлӢ№мһҗ *">
              <MultiAssigneePicker brandId={brandId} value={assigneeIds} onChange={setAssigneeIds} />
            </FormField>
            <div className="grid grid-cols-2 gap-4">
              <FormField label="л§Ҳк°җмқј">
                <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                       className="w-full rounded-sm px-2 py-1.5 text-xs outline-none transition"
                       style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}} />
              </FormField>
              <FormField label="мҡ°м„ мҲңмң„">
                <PriorityButtons value={priority} onChange={setPriority} />
              </FormField>
            </div>
            <div className="rounded-sm p-3 flex items-start gap-3" style={{background: isPrivate ? 'rgba(234,179,8,0.08)' : 'var(--surface-2)', border: '1px solid ' + (isPrivate ? '#d6c08a' : 'var(--border)'), transition:'all 0.15s ease'}}>
              <button type="button"
                      onClick={() => setIsPrivate(!isPrivate)}
                      className="flex-shrink-0 mt-0.5 rounded transition flex items-center justify-center"
                      style={{
                        width:'18px', height:'18px',
                        background: isPrivate ? '#a37800' : 'white',
                        border: '1.5px solid ' + (isPrivate ? '#a37800' : 'var(--border-strong)'),
                      }}>
                {isPrivate && (
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                )}
              </button>
              <button type="button" onClick={() => setIsPrivate(!isPrivate)} className="text-left flex-1">
                <div className="flex items-center gap-1.5 text-sm" style={{color: isPrivate ? '#854d0e' : 'var(--ink)', fontWeight: isPrivate ? 600 : 500}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                  л№„кіөк°ң мһ‘м—…
                </div>
                <div className="text-xs mt-0.5 leading-relaxed" style={{color: isPrivate ? '#a37800' : 'var(--text-muted)'}}>
                  {isPrivate
                    ? 'лӢҙлӢ№мһҗ, мһ‘м„ұмһҗ, мқҙлҸҷнҳ„ м°ЁмһҘ(кҙҖлҰ¬мһҗ)л§Ң мқҙ мһ‘м—…мқ„ ліј мҲҳ мһҲмҠөлӢҲлӢӨ'
                    : 'мІҙнҒ¬н•ҳл©ҙ лӢҙлӢ№мһҗм—җкІҢл§Ң н‘ңмӢңлҗ©лӢҲлӢӨ'}
                </div>
              </button>
            </div>
            <div className="flex items-center justify-end gap-3 pt-4" style={{borderTop:'1px solid var(--border)'}}>
              <button type="button" onClick={onClose} className="text-sm px-4 py-2 transition" style={{color:'var(--text-muted)'}}>м·ЁмҶҢ</button>
              <button type="submit" disabled={!title.trim() || !brandId || assigneeIds.length === 0}
                      className="text-sm px-5 py-2 rounded-sm transition disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{background:'var(--ink)', color:'white'}}>
                {mode === 'create' ? 'мһ‘м—… л“ұлЎқ' : 'м ҖмһҘ'}
              </button>
            </div>
          </form>
        </Modal>
      );
    }

    /* ============================================================
       MODAL SHELL
       ============================================================ */
    function Modal({ children, onClose }) {
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, [onClose]);
      // Render to document.body via portal so parent stacking contexts
      // (e.g. header backdrop-filter) cannot trap our fixed-position layer.
      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
             style={{background:'rgba(30,39,70,0.32)', backdropFilter:'blur(4px)'}}
             onClick={onClose}>
          <div className="w-full max-w-3xl rounded-sm shadow-2xl"
               style={{background:'var(--surface)', border:'1px solid var(--border)', maxHeight:'90vh', overflowY:'auto'}}
               onClick={e => e.stopPropagation()}>
            {children}
          </div>
        </div>,
        document.body
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
