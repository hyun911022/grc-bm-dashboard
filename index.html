      --ink-soft: #2c3552;
      --text: #141414;
      --text-muted: #4a4a4a;
      --text-faint: #8a8a8a;
      --accent: #1e2746;
      --accent-soft: #5d6584;
      --warm: #b8a684;
      --header-from: #1c2540;
      --header-to: #2a3556;
          }
    html, body { background: var(--bg); color: var(--text); }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .font-display { font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-weight: 700; letter-spacing: -0.01em; }
    .font-display-light { font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-weight: 600; letter-spacing: 0; }
    .font-eyebrow { font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif; font-weight: 500; letter-spacing: 0.18em; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c4c8cf; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #9aa0aa; }
    input[type="date"] { color-scheme: light; }
    /* Smooth accordion */
    .acc-content { overflow: hidden; transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1); }
    /* View transitions */
    .fade-up { animation: fade-up 0.45s cubic-bezier(0.4, 0, 0.2, 1) both; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .stagger > * { opacity: 0; animation: fade-up 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    .stagger > *:nth-child(1)  { animation-delay: 0.00s; }
    .stagger > *:nth-child(2)  { animation-delay: 0.04s; }
    .stagger > *:nth-child(3)  { animation-delay: 0.08s; }
    .stagger > *:nth-child(4)  { animation-delay: 0.12s; }
    .stagger > *:nth-child(5)  { animation-delay: 0.16s; }
    .stagger > *:nth-child(6)  { animation-delay: 0.20s; }
    .stagger > *:nth-child(7)  { animation-delay: 0.24s; }
    .stagger > *:nth-child(8)  { animation-delay: 0.28s; }
    .stagger > *:nth-child(9)  { animation-delay: 0.32s; }
    .stagger > *:nth-child(10) { animation-delay: 0.36s; }
    .stagger > *:nth-child(11) { animation-delay: 0.40s; }
    .stagger > *:nth-child(12) { animation-delay: 0.44s; }
    .hero-card-bg { background-size: cover; background-position: center; position: absolute; inset: 0; opacity: 0.18; mix-blend-mode: luminosity; }
    .hero-overlay { position: absolute; inset: 0; background:
      radial-gradient(ellipse at 70% 25%, rgba(255,255,255,0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 20% 80%, rgba(0,0,0,0.25) 0%, transparent 50%); pointer-events: none; }
    /* Mentions & comments */
    .mention-chip { display: inline-block; padding: 0 4px; border-radius: 3px; background: rgba(37,99,235,0.10); color: #2563eb; font-weight: 500; font-size: 0.95em; line-height: 1.4; transition: background 0.15s ease; user-select: all; }
    .mention-chip:hover { background: rgba(37,99,235,0.18); }
    .rich-input { white-space: pre-wrap; word-break: break-word; outline: none; }
    .rich-input:empty:before { content: attr(data-placeholder); color: var(--text-faint); pointer-events: none; }
    .rich-input .mention-chip { cursor: default; }
    .mention-popup { position: absolute; background: white; border: 1px solid var(--border-strong); border-radius: 6px; box-shadow: 0 8px 24px rgba(30,39,70,0.15); z-index: 100; min-width: 220px; max-height: 220px; overflow-y: auto; padding: 4px; }
    .mention-popup-item { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; padding: 7px 10px; background: transparent; border: none; cursor: pointer; border-radius: 4px; font-size: 13px; color: var(--ink); }
    .mention-popup-item:hover, .mention-popup-item.active { background: var(--surface-2); }
    .mention-popup-meta { color: var(--text-faint); font-size: 11px; }
    .comment-thread-divider { height: 1px; background: var(--border); margin: 12px 0; }
  </style>

IUSKOwQ5N0IIIYTIPP8P3C0lr/k+2awAAAAASUVORK5CYII=';

    /* ---------- HELPERS ---------- */
    const memberById = (id) => MEMBERS.find(m => m.id === id);
    const brandById  = (id) => BRANDS.find(b => b.id === id);
    const statusOf   = (id) => STATUS.find(s => s.id === id) || STATUS[0];
    const priorityOf = (id) => PRIORITY.find(p => p.id === id) || PRIORITY[1];

    const todayKST = () => {
      const d = new Date();
      const kst = new Date(d.getTime() + 9 * 3600000 - d.getTimezoneOffset() * 60000);
      return kst.toISOString().slice(0, 10);
    };
    const fmtDate = (iso) => {
      if (!iso) return null;
      const d = new Date(iso + 'T00:00:00+09:00');
      return `${d.getMonth()+1}/${d.getDate()}`;
    };
    const daysUntil = (iso) => {
      if (!iso) return null;
      const t = new Date(todayKST() + 'T00:00:00+09:00').getTime();
      const d = new Date(iso + 'T00:00:00+09:00').getTime();
      return Math.round((d - t) / 86400000);
    };
    const newId = () => 't_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);


    /* ============================================================
       MAIN APP
       ============================================================ */
    function LoginScreen({ pins, onLogin }) {
      const [stage, setStage] = useState('pick'); // pick | pin
      const [picked, setPicked] = useState(null);
      const [pin, setPin] = useState('');
      const [err, setErr] = useState('');
      const inputRef = useRef(null);

      const choose = (id) => {
        setPicked(id);
        setPin('');
        setErr('');
        setStage('pin');
        try { window.history.pushState({ grcLoginPin: true }, ''); } catch {}
        setTimeout(() => inputRef.current && inputRef.current.focus(), 50);
      };
      useEffect(() => {
        const onPop = () => {
          if (stage === 'pin') {
            setStage('pick'); setPicked(null); setPin(''); setErr('');
          }
        };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, [stage]);
      const submit = (e) => {
        if (e) e.preventDefault();
        if (pin.length !== 4) return;
        if (onLogin(picked, pin)) {
          // success - parent will re-render
        } else {
          setErr('비밀번호가 올바르지 않습니다');
          setPin('');
        }
      };

      const groups = [
        { id: 'head',  label: 'MANAGER', members: MEMBERS.filter(m => m.group === 'head') },
        ...PARTS.map(p => ({ id: p.id, label: 'Pod ' + PART_THEME[p.id].numeral, members: p.members.map(memberById) })),
      ];
      const me = picked ? memberById(picked) : null;

      return (
        <div className="min-h-screen flex items-center justify-center px-6 relative" style={{background: 'linear-gradient(135deg, var(--header-from) 0%, var(--header-to) 100%)'}}>
            <div className="hero-overlay" style={{position:'fixed'}}></div>
          <div className="w-full relative" style={{maxWidth: '720px', zIndex: 1}}>
            <div className="text-center mb-10">
              <img src={LOGO_SRC} alt="Grace International" style={{height:'26px', opacity: 0.95, margin: '0 auto'}} />
              <div className="text-xs font-eyebrow uppercase mt-3" style={{color:'rgba(255,255,255,0.7)'}}>BM Management Console</div>
            </div>
            {stage === 'pick' && (
              <div className="rounded-lg p-8" style={{background:'var(--surface)', border:'1px solid var(--border)'}}>
                <h2 className="font-display text-2xl tracking-tight mb-6" style={{color:'var(--ink)'}}>본인을 선택하세요</h2>
                <div className="space-y-5">
                  {groups.map(g => (
                    <div key={g.id}>
                      <div className="text-xs font-eyebrow uppercase mb-2" style={{color:'var(--text-faint)'}}>{g.label}</div>
                      <div className="flex flex-wrap gap-2">
                        {g.members.map(m => (
                          <button key={m.id} onClick={() => choose(m.id)}
                                  className="px-3.5 py-2 rounded-full transition text-sm tracking-wide"
                                  style={{background:'var(--surface)', border:'1px solid var(--border-strong)', color:'var(--text)'}}
                                  onMouseEnter={(e)=>{e.currentTarget.style.borderColor='var(--ink)';e.currentTarget.style.background='var(--surface-2)';}}
                                  onMouseLeave={(e)=>{e.currentTarget.style.borderColor='var(--border-strong)';e.currentTarget.style.background='var(--surface)';}}>
                            <span style={{fontWeight: 500, color:'var(--ink)'}}>{m.name}</span>
                            <span style={{color:'var(--text-muted)', marginLeft:'6px', fontSize:'12px'}}>{m.title}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {stage === 'pin' && (
              <form onSubmit={submit} className="rounded-lg p-8" style={{background:'var(--surface)', border:'1px solid var(--border)'}}>
                <button type="button" onClick={() => { setStage('pick'); setPicked(null); }}
                        className="text-xs tracking-wider mb-5 transition" style={{color:'var(--text-muted)'}}
                        onMouseEnter={(e)=>e.currentTarget.style.color='var(--ink)'}
                        onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}>
                  ← 다시 선택
                </button>
                <div className="text-xs font-eyebrow uppercase mb-1" style={{color:'var(--text-faint)'}}>{me?.role}</div>
                <h2 className="font-display text-2xl tracking-tight mb-6" style={{color:'var(--ink)'}}>
                  {me?.name} <span className="text-sm font-normal" style={{color:'var(--text-muted)'}}>{me?.title}</span>
                </h2>
                <label className="text-xs font-eyebrow uppercase block mb-2" style={{color:'var(--text-muted)'}}>비밀번호 (4자리)</label>
                <input ref={inputRef} type="password" inputMode="numeric" maxLength={4} pattern="[0-9]{4}"
                       value={pin}
                       onChange={(e) => { setErr(''); setPin(e.target.value.replace(/[^0-9]/g, '').slice(0, 4)); }}
                       autoComplete="off"
                       className="w-full rounded-sm px-4 py-3 text-2xl tracking-[0.5em] outline-none transition tabular-nums text-center"
                       style={{background:'var(--surface)', border:'1px solid var(--border-strong)', color:'var(--ink)'}} />
                {err && <p className="text-xs mt-2" style={{color:'#a83247'}}>{err}</p>}
                <p className="text-xs mt-2" style={{color:'var(--text-faint)'}}>초기 비밀번호는 0000입니다. 잊으셨다면 이동현 차장에게 리셋 요청하세요.</p>
                <button type="submit" disabled={pin.length !== 4}
                        className="w-full mt-5 py-2.5 rounded-sm transition text-sm tracking-wide disabled:opacity-30 disabled:cursor-not-allowed"
                        style={{background:'var(--ink)', color:'white'}}>
                  로그인
                </button>
              </form>
            )}
          </div>
        </div>
      );
    }

    function ForceSetPinScreen({ currentUser, onSetPin, onLogout }) {
      const [newPin, setNewPin] = useState('');
      const [confirmPin, setConfirmPin] = useState('');
      const [err, setErr] = useState('');
      const me = memberById(currentUser);
      const submit = (e) => {
        e.preventDefault();
        if (newPin.length !== 4) { setErr('4자리 숫자를 입력하세요'); return; }
        if (newPin === '0000') { setErr('초기 비밀번호와 다른 값을 사용하세요'); return; }
        if (newPin !== confirmPin) { setErr('두 비밀번호가 일치하지 않습니다'); return; }
        onSetPin(newPin);
      };
      const inputCls = "w-full rounded-sm px-4 py-3 text-2xl tracking-[0.5em] outline-none transition tabular-nums text-center";
      const inputStyle = { background:'var(--surface)', border:'1px solid var(--border-strong)', color:'var(--ink)' };
      return (
        <div className="min-h-screen flex items-center justify-center px-6 relative"
             style={{background: 'linear-gradient(135deg, var(--header-from) 0%, var(--header-to) 100%)'}}>
          <div className="hero-overlay" style={{position:'fixed'}}></div>
          <div className="w-full relative" style={{maxWidth:'480px', zIndex:1}}>
            <div className="text-center mb-8">
              <img src={LOGO_SRC} alt="Grace International" style={{height:'24px', opacity:0.95, margin:'0 auto'}} />
              <div className="text-xs font-eyebrow uppercase mt-3" style={{color:'rgba(255,255,255,0.7)'}}>비밀번호 초기 설정</div>
            </div>
            <form onSubmit={submit} className="rounded-lg p-8" style={{background:'var(--surface)', border:'1px solid var(--border)'}}>
              <div className="text-[10px] tracking-[0.3em] uppercase mb-1.5 font-eyebrow" style={{color:'var(--text-faint)'}}>{me?.role}</div>
              <h2 className="font-display text-2xl tracking-tight mb-2" style={{color:'var(--ink)'}}>
                {me?.name} <span className="text-sm font-normal" style={{color:'var(--text-muted)'}}>{me?.title}</span>
              </h2>
              <p className="text-sm mb-6 leading-relaxed" style={{color:'var(--text-muted)'}}>
                초기 비밀번호로 로그인했습니다. 본인이 사용할 4자리 숫자를 새로 설정해주세요.
              </p>
              <div className="space-y-4">
                <div>
                  <label className="text-[10px] tracking-[0.2em] uppercase mb-1.5 block" style={{color:'var(--text-muted)'}}>새 비밀번호 (4자리)</label>
                  <input type="password" inputMode="numeric" maxLength={4} value={newPin}
                         onChange={(e) => { setErr(''); setNewPin(e.target.value.replace(/[^0-9]/g,'').slice(0,4)); }}
                         autoFocus autoComplete="off"
                         className={inputCls} style={inputStyle} />
                </div>
                <div>
                  <label className="text-[10px] tracking-[0.2em] uppercase mb-1.5 block" style={{color:'var(--text-muted)'}}>비밀번호 확인</label>
                  <input type="password" inputMode="numeric" maxLength={4} value={confirmPin}
                         onChange={(e) => { setErr(''); setConfirmPin(e.target.value.replace(/[^0-9]/g,'').slice(0,4)); }}
                         autoComplete="off"
                         className={inputCls} style={inputStyle} />
                </div>
              </div>
              {err && <p className="text-xs mt-3" style={{color:'#a83247'}}>{err}</p>}
              <button type="submit" disabled={newPin.length !== 4 || confirmPin.length !== 4}
                      className="w-full mt-6 py-2.5 rounded-sm transition text-sm tracking-wide disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{background:'var(--ink)', color:'white'}}>
                설정 완료
              </button>
              <button type="button" onClick={onLogout}
                      className="w-full mt-2 py-2 text-xs tracking-wider transition" style={{color:'var(--text-muted)'}}>
                다른 계정으로 로그인
              </button>
            </form>
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState('members');
      const [tasks, setTasks] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [openBrand, setOpenBrand] = useState(null);
      const [openMember, setOpenMember] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [currentUser, setCurrentUser] = useState(null);
      const [pins, setPins] = useState({});
      const [mustSetPin, setMustSetPin] = useState(false);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            // Migrate: ensure comments[] + createdBy
            const migrated = parsed.map(t => ({
              ...t,
              comments: t.comments || [],
              createdBy: t.createdBy || 'lee_dh',
              assigneeIds: t.assigneeIds || (t.assigneeId ? [t.assigneeId] : []),
              status: STATUS_MIGRATE[t.status] || t.status || 'pending',
            }));
            setTasks(migrated);
          }
          const pRaw = localStorage.getItem(PINS_KEY);
          const loadedPins = pRaw ? JSON.parse(pRaw) : {};
          const filled = {};
          MEMBERS.forEach(mm => { filled[mm.id] = loadedPins[mm.id] || '0000'; });
          setPins(filled);
          if (!pRaw) localStorage.setItem(PINS_KEY, JSON.stringify(filled));
          const savedUser = localStorage.getItem(USER_KEY);
          if (savedUser && MEMBERS.find(m => m.id === savedUser)) {
            setCurrentUser(savedUser);
            if (filled[savedUser] === '0000') setMustSetPin(true);
          }
        } catch (e) {}
        setLoaded(true);
      }, []);

      const login = (id, pin) => {
        if (pins[id] !== pin) return false;
        setCurrentUser(id);
        try { localStorage.setItem(USER_KEY, id); } catch {}
        if (pin === '0000') setMustSetPin(true);
        return true;
      };
      const logout = () => {
        setCurrentUser(null);
        try { localStorage.removeItem(USER_KEY); } catch {}
      };
      const setPin = (id, pin) => {
        const next = { ...pins, [id]: pin };
        setPins(next);
        try { localStorage.setItem(PINS_KEY, JSON.stringify(next)); } catch {}
        if (id === currentUser && pin !== '0000') setMustSetPin(false);
      };
      const resetPinAdmin = (id) => {
        const next = { ...pins, [id]: '0000' };
        setPins(next);
        try { localStorage.setItem(PINS_KEY, JSON.stringify(next)); } catch {}
      };
      const resetPin = (id) => resetPinAdmin(id);

      const addComment = (taskId, body) => {
        const t = tasks.find(x => x.id === taskId);
        if (!t) return;
        const c = {
          id: 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5),
          authorId: currentUser,
          body: body,
          createdAt: new Date().toISOString(),
        };
        updateTask(taskId, { comments: [...(t.comments || []), c] });
      };

      const deleteComment = (taskId, commentId) => {
        const t = tasks.find(x => x.id === taskId);
        if (!t) return;
        updateTask(taskId, { comments: (t.comments || []).filter(c => c.id !== commentId) });
      };

      const persist = (next) => {
        setTasks(next);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); }
        catch (e) { console.error(e); }
      };

      const addTask = (data) => {
        const t = {
          id: newId(),
          brandId: data.brandId,
          title: data.title,
          description: data.description || '',
          assigneeIds: data.assigneeIds || [],
          dueDate: data.dueDate || '',
          priority: data.priority || 'normal',
          status: data.status || 'pending',
          createdBy: currentUser,
          comments: [],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        };
        persist([t, ...tasks]);
      };
      const updateTask = (id, patch) =>
        persist(tasks.map(t => t.id === id ? { ...t, ...patch, updatedAt: new Date().toISOString() } : t));
      const deleteTask = (id) => persist(tasks.filter(t => t.id !== id));
      // Remove current user from a shared task; if they're the only assignee (or not in
      // assignees at all), delete the task outright.
      const removeOrDelete = (id) => {
        const t = tasks.find(x => x.id === id);
        if (!t) return;
        const ids = t.assigneeIds || (t.assigneeId ? [t.assigneeId] : []);
        const others = ids.filter(x => x !== currentUser);
        if (ids.includes(currentUser) && others.length > 0) {
          updateTask(id, { assigneeIds: others });
        } else {
          deleteTask(id);
        }
      };
      const cycleStatus = (id) => {
        const t = tasks.find(x => x.id === id);
        if (!t) return;
        const order = ['pending', 'in_progress', 'review', 'done'];
        const idx = order.indexOf(t.status);
        updateTask(id, { status: order[(idx + 1) % order.length] });
      };


      // Browser back-button awareness:
      // any time a modal/expansion opens, push a history state. popstate (back) closes it.
      const isAnyOpen = !!(openBrand || openMember || showAdd || editingTask);
      useEffect(() => {
        if (isAnyOpen) {
          window.history.pushState({ grcModal: true }, '');
          const onPop = () => {
            // Close in priority order, top-most first.
            if (editingTask) { setEditingTask(null); return; }
            if (showAdd) { setShowAdd(false); return; }
            if (openMember) { setOpenMember(null); return; }
            if (openBrand) { setOpenBrand(null); return; }
          };
          window.addEventListener('popstate', onPop);
          return () => window.removeEventListener('popstate', onPop);
        }
      }, [isAnyOpen]);

      const stats = useMemo(() => {
        const byBrand = {}, byBrandActive = {}, byMember = {}, byMemberActive = {}, byMemberMentions = {}, byMemberReplies = {};
        const byPart = {}, byPartActive = {};
        tasks.forEach(t => {
          byBrand[t.brandId] = (byBrand[t.brandId] || 0) + 1;
          if (t.status !== 'done') byBrandActive[t.brandId] = (byBrandActive[t.brandId] || 0) + 1;
          const ids = t.assigneeIds || (t.assigneeId ? [t.assigneeId] : []);
          ids.forEach(aid => {
            byMember[aid] = (byMember[aid] || 0) + 1;
            if (t.status !== 'done') byMemberActive[aid] = (byMemberActive[aid] || 0) + 1;
          });
          // count mentions in description + comments
          extractMentionIds(t.description || '').forEach(mid => {
            byMemberMentions[mid] = (byMemberMentions[mid] || 0) + 1;
          });
          (t.comments || []).forEach(c => {
            extractMentionIds(c.body || '').forEach(mid => {
              byMemberMentions[mid] = (byMemberMentions[mid] || 0) + 1;
            });
            if (t.createdBy && c.authorId !== t.createdBy) {
              byMemberReplies[t.createdBy] = (byMemberReplies[t.createdBy] || 0) + 1;
            }
          });
          const b = brandById(t.brandId);
          if (b) {
            byPart[b.part] = (byPart[b.part] || 0) + 1;
            if (t.status !== 'done') byPartActive[b.part] = (byPartActive[b.part] || 0) + 1;
          }
        });
        const active = tasks.filter(t => t.status !== 'done').length;
        const inProgress = tasks.filter(t => t.status === 'in_progress').length;
        const overdue = tasks.filter(t => t.status !== 'done' && t.dueDate && daysUntil(t.dueDate) < 0).length;
        return { byBrand, byBrandActive, byMember, byMemberActive, byMemberMentions, byMemberReplies, byPart, byPartActive, active, inProgress, overdue, total: tasks.length };
      }, [tasks]);

      if (!loaded) {
        return (
          <div className="min-h-screen flex items-center justify-center" style={{background:'var(--bg)', color:'var(--text-faint)'}}>
            <div className="text-xs tracking-[0.3em] uppercase">Loading</div>
          </div>
        );
      }
      if (!currentUser) {
        return <LoginScreen pins={pins} onLogin={login} />;
      }
      if (mustSetPin) {
        return <ForceSetPinScreen
                 currentUser={currentUser}
                 onSetPin={(p) => setPin(currentUser, p)}
                 onLogout={logout} />;
      }

      return (
        <div className="min-h-screen" style={{background:'var(--bg)', color:'var(--text)'}}>
          <Header view={view} setView={setView} currentUser={currentUser} onLogout={logout} pins={pins} onSetPin={setPin} onResetPin={resetPin} />

          <main className="max-w-6xl mx-auto px-8 py-12">
            <div className="mb-8 pb-5 flex items-end justify-between gap-4 flex-wrap" style={{borderBottom:'1px solid var(--border)'}}>
              <h2 className="font-display text-xl tracking-tight" style={{color:'var(--text-faint)'}}>
                {view === 'brands' ? '브랜드 포트폴리오' : '담당자별 아젠다'}
              </h2>
              <div className="flex items-center gap-2">
                <button
                  onClick={() => setShowAdd(true)}
                  className="text-xs px-4 py-1.5 rounded-full transition tracking-wide flex items-center gap-1.5"
                  style={{background:'transparent', color:'var(--ink)', border:'1px solid var(--ink)', fontWeight:500}}
                  onMouseEnter={(e)=>{e.currentTarget.style.background='var(--ink)';e.currentTarget.style.color='white';}}
                  onMouseLeave={(e)=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--ink)';}}>
                  <Plus size={12} strokeWidth={2.2} /> 새 작업
                </button>
              </div>
            </div>
            {view === 'brands' ? (
              <BrandsView
                tasks={tasks}
                stats={stats}
                onOpenBrand={(id) => setOpenBrand(id)}
              />
            ) : (
              <MembersView
                tasks={tasks}
                stats={stats}
                onOpenMember={(id) => setOpenMember(id)}
              />
            )}
          </main>

          <footer className="max-w-6xl mx-auto px-8 py-10 text-xs border-t flex flex-col gap-1.5" style={{color:'var(--text-faint)', borderColor:'var(--border)'}}>
            <span className="tracking-[0.25em] uppercase">Grace International · Brand Management · Operations</span>
            <span className="tracking-wider">개발자 : BM부 이동현 차장</span>
          </footer>

          {openBrand && (
            <BrandModal
              brandId={openBrand}
              tasks={tasks.filter(t => t.brandId === openBrand)}
              onClose={() => setOpenBrand(null)}
              onAdd={addTask} onUpdate={updateTask} onDelete={removeOrDelete}
              onChangeStatus={(id, next) => updateTask(id, { status: next })} onEdit={(t) => setEditingTask(t)}
              currentUser={currentUser}
              onAddComment={addComment} onDeleteComment={deleteComment}
            />
          )}
          {openMember && (
            <MemberModal
              memberId={openMember}
              tasks={tasks}
              allTasks={tasks}
              onClose={() => setOpenMember(null)}
              onUpdate={updateTask} onDelete={removeOrDelete}
              onChangeStatus={(id, next) => updateTask(id, { status: next })} onEdit={(t) => setEditingTask(t)}
              currentUser={currentUser}
              onAddComment={addComment} onDeleteComment={deleteComment}
              onOpenBrand={(id) => { setOpenMember(null); setOpenBrand(id); }}
              onAssign={(memberId) => { setOpenMember(null); setShowAdd({ assigneeIds: [memberId] }); }}
            />
          )}
          {showAdd && (
            <TaskFormModal
              mode="create" initialBrand={null}
              initial={typeof showAdd === 'object' ? showAdd : null}
              onClose={() => setShowAdd(false)}
              onSubmit={(data) => { addTask(data); setShowAdd(false); }}
            />
          )}
          {editingTask && (
            <TaskFormModal
              mode="edit" initial={editingTask}
              onClose={() => setEditingTask(null)}
              onSubmit={(data) => { updateTask(editingTask.id, data); setEditingTask(null); }}
            />
          )}
        </div>
      );
    }

    /* ============================================================
       HEADER (Grace-style brand bar)
       ============================================================ */
    function Header({ view, setView, currentUser, onLogout, pins, onSetPin, onResetPin }) {
      const reload = () => { window.scrollTo({top:0, behavior:'smooth'}); setView('members'); setTimeout(() => window.location.reload(), 50); };
      const me = memberById(currentUser);
      const headerBg = 'linear-gradient(180deg, var(--header-from) 0%, var(--header-to) 100%)';
      const textCol = 'rgba(255,255,255,0.92)';
      const mutedCol = 'rgba(255,255,255,0.62)';
      const dividerCol = 'rgba(255,255,255,0.18)';
      const borderCol = 'rgba(255,255,255,0.12)';

      return (
        <header className="sticky top-0 z-30 backdrop-blur"
                style={{background: headerBg, borderBottom: '1px solid ' + borderCol}}>
          <div className="max-w-6xl mx-auto px-8 py-5 flex items-center justify-between gap-6">
            <button onClick={reload} className="flex items-center gap-4 group cursor-pointer flex-shrink-0" title="처음으로">
              <img src={LOGO_SRC} alt="Grace International"
                   style={{height:'22px', width:'auto'}}
                   className="opacity-95 group-hover:opacity-100" />
              <span className="hidden md:inline-block w-px h-5" style={{background: dividerCol}}></span>
              <span className="hidden md:inline text-xs font-eyebrow uppercase"
                    style={{color: mutedCol, fontWeight: 500}}>
                Brand Management
              </span>
            </button>
            <div className="flex items-center gap-5">
              <div className="flex items-center">
                <TabBtn active={view === 'members'} onClick={() => setView('members')} label="담당자" sub="People" />
                <TabBtn active={view === 'brands'}  onClick={() => setView('brands')}  label="브랜드" sub="Brands" last />
              </div>
              <span className="hidden md:inline-block w-px h-5" style={{background: dividerCol}}></span>
              <UserPicker currentUser={currentUser} onLogout={onLogout} pins={pins} onSetPin={onSetPin} onResetPin={onResetPin} />
            </div>
          </div>
        </header>
      );
    }

    function Stat({ label, value, highlight, danger }) {
      const valColor = danger ? 'var(--ink)' : highlight ? 'var(--ink)' : 'var(--ink-soft)';
      return (
        <div className="flex items-baseline gap-2">
          <span className="tracking-[0.2em] uppercase font-light" style={{fontSize:'10px', color: danger ? '#a83247' : 'var(--text-muted)'}}>{label}</span>
          <span className="text-base tabular-nums font-light" style={{color: danger ? '#a83247' : valColor}}>{value}</span>
        </div>
      );
    }

    function UserPicker({ currentUser, onLogout, pins, onSetPin, onResetPin }) {
      const [open, setOpen] = useState(false);
      const [showPwModal, setShowPwModal] = useState(false);
      const [showAdmin, setShowAdmin] = useState(false);
      const me = memberById(currentUser);
      const isAdmin = currentUser === 'lee_dh';
      useEffect(() => {
        if (!open) return;
        const close = () => setOpen(false);
        window.addEventListener('click', close);
        return () => window.removeEventListener('click', close);
      }, [open]);
      return (
        <>
          <div className="relative" onClick={(e) => e.stopPropagation()}>
            <button onClick={() => setOpen(o => !o)}
                    className="flex items-center gap-2 text-xs px-2.5 py-1.5 rounded-full transition"
                    style={{background:'rgba(255,255,255,0.08)', color:'rgba(255,255,255,0.85)', border:'1px solid rgba(255,255,255,0.12)'}}>
              <span className="w-1.5 h-1.5 rounded-full" style={{background:'#7a8c5e'}}></span>
              <span className="font-medium">{me?.name || '—'}</span>
              <span style={{color:'rgba(255,255,255,0.55)'}}>{me?.title || ''}</span>
              <ChevronDown size={11} strokeWidth={1.5} style={{opacity:0.6}} />
            </button>
            {open && (
              <div className="absolute right-0 mt-1 mention-popup" style={{minWidth:'200px'}}>
                <button className="mention-popup-item" onClick={() => { setShowPwModal(true); setOpen(false); }}>
                  <span style={{flex:1}}>비밀번호 변경</span>
                </button>
                {isAdmin && (
                  <button className="mention-popup-item" onClick={() => { setShowAdmin(true); setOpen(false); }}>
                    <span style={{flex:1}}>비밀번호 관리 <span className="mention-popup-meta">관리자</span></span>
                  </button>
                )}
                <div style={{height:1, background:'var(--border)', margin:'4px 0'}}></div>
                <button className="mention-popup-item" onClick={() => { onLogout(); setOpen(false); }}>
                  <span style={{flex:1, color:'#a83247'}}>로그아웃</span>
                </button>
              </div>
            )}
          </div>
          {showPwModal && (
            <ChangePinModal
              memberId={currentUser}
              currentPin={pins[currentUser]}
              onSave={(newPin) => { onSetPin(currentUser, newPin); setShowPwModal(false); }}
              onClose={() => setShowPwModal(false)} />
          )}
          {showAdmin && (
            <PinAdminModal
              pins={pins}
              onResetPin={onResetPin}
              onClose={() => setShowAdmin(false)} />
          )}
        </>
      );
    }

    function ChangePinModal({ memberId, currentPin, onSave, onClose }) {
      const [oldPin, setOldPin] = useState('');
      const [newPin, setNewPin] = useState('');
      const [confirm, setConfirm] = useState('');
      const [err, setErr] = useState('');
      const submit = (e) => {
        e.preventDefault();
        if (oldPin !== currentPin) { setErr('현재 비밀번호가 다릅니다'); return; }
        if (newPin.length !== 4) { setErr('새 비밀번호는 4자리여야 합니다'); return; }
        if (newPin !== confirm) { setErr('새 비밀번호가 일치하지 않습니다'); return; }
        onSave(newPin);
      };
      const inputCls = "w-full rounded-sm px-3 py-2 text-base tracking-[0.4em] outline-none transition tabular-nums text-center";
      const inputStyle = { background:'var(--surface)', border:'1px solid var(--border-strong)', color:'var(--ink)' };
      return (
        <Modal onClose={onClose}>
          <div className="px-8 py-6" style={{borderBottom:'1px solid var(--border)'}}>
            <div className="text-[10px] tracking-[0.3em] uppercase mb-1.5 font-eyebrow" style={{color:'var(--text-faint)'}}>Change Password</div>
            <h2 className="font-display text-2xl tracking-tight" style={{color:'var(--ink)'}}>비밀번호 변경</h2>
          </div>
          <form onSubmit={submit} className="px-8 py-6 space-y-5">
            <div>
              <label className="text-[10px] tracking-[0.2em] uppercase mb-1.5 block" style={{color:'var(--text-muted)'}}>현재 비밀번호</label>
              <input type="password" inputMode="numeric" maxLength={4} value={oldPin}
                     onChange={(e) => { setErr(''); setOldPin(e.target.value.replace(/[^0-9]/g,'').slice(0,4)); }}
                     className={inputCls} style={inputStyle} autoFocus />
            </div>
            <div>
              <label className="text-[10px] tracking-[0.2em] uppercase mb-1.5 block" style={{color:'var(--text-muted)'}}>새 비밀번호 (4자리)</label>
              <input type="password" inputMode="numeric" maxLength={4} value={newPin}
                     onChange={(e) => { setErr(''); setNewPin(e.target.value.replace(/[^0-9]/g,'').slice(0,4)); }}
                     className={inputCls} style={inputStyle} />
            </div>
            <div>
              <label className="text-[10px] tracking-[0.2em] uppercase mb-1.5 block" style={{color:'var(--text-muted)'}}>새 비밀번호 확인</label>
              <input type="password" inputMode="numeric" maxLength={4} value={confirm}
                     onChange={(e) => { setErr(''); setConfirm(e.target.value.replace(/[^0-9]/g,'').slice(0,4)); }}
                     className={inputCls} style={inputStyle} />
            </div>
            {err && <p className="text-xs" style={{color:'#a83247'}}>{err}</p>}
            <div className="flex justify-end gap-3 pt-3" style={{borderTop:'1px solid var(--border)'}}>
              <button type="button" onClick={onClose} className="text-sm px-4 py-2" style={{color:'var(--text-muted)'}}>취소</button>
              <button type="submit" className="text-sm px-5 py-2 rounded-sm" style={{background:'var(--ink)', color:'white'}}>변경</button>
            </div>
          </form>
        </Modal>
      );
    }

    function PinAdminModal({ pins, onResetPin, onClose }) {
      return (
        <Modal onClose={onClose}>
          <div className="px-8 py-6 flex items-center justify-between" style={{borderBottom:'1px solid var(--border)'}}>
            <div>
              <div className="text-[10px] tracking-[0.3em] uppercase mb-1.5 font-eyebrow" style={{color:'var(--text-faint)'}}>Admin · 비밀번호 관리</div>
              <h2 className="font-display text-2xl tracking-tight" style={{color:'var(--ink)'}}>구성원 비밀번호 리셋</h2>
            </div>
            <button onClick={onClose} style={{color:'var(--text-muted)'}}>
              <XIcon size={18} strokeWidth={1.5} />
            </button>
          </div>
          <div className="px-8 py-6 overflow-y-auto" style={{ maxHeight: '60vh' }}>
            <p className="text-xs mb-4" style={{color:'var(--text-muted)'}}>각 구성원의 비밀번호를 초기값(0000)으로 리셋할 수 있습니다.</p>
            <ul className="space-y-2">
              {MEMBERS.map(m => (
                <li key={m.id} className="flex items-center justify-between p-3 rounded-sm"
                    style={{border:'1px solid var(--border)', background:'var(--surface)'}}>
                  <div>
                    <div className="text-sm" style={{color:'var(--ink)', fontWeight:500}}>
                      {m.name} <span style={{color:'var(--text-muted)', fontWeight:400, fontSize:'12px'}}>{m.title}</span>
                    </div>
                    <div className="text-[10px] tracking-wide mt-0.5" style={{color:'var(--text-faint)'}}>
                      {m.role} · 현재 PIN {pins[m.id] === '0000' ? '(초기값)' : '설정됨'}
                    </div>
                  </div>
                  <button onClick={() => { if (confirm(`${m.name}님의 비밀번호를 0000으로 리셋합니다.`)) onResetPin(m.id); }}
                          className="text-xs px-3 py-1.5 rounded-sm transition tracking-wide"
                          style={{background:'var(--surface)', border:'1px solid var(--border-strong)', color:'var(--text)'}}
                          onMouseEnter={(e)=>{e.currentTarget.style.borderColor='var(--ink)';e.currentTarget.style.color='var(--ink)';}}
                          onMouseLeave={(e)=>{e.currentTarget.style.borderColor='var(--border-strong)';e.currentTarget.style.color='var(--text)';}}>
                    PIN 리셋
                  </button>
                </li>
              ))}
            </ul>
          </div>
        </Modal>
      );
    }

    function TabBtn({ active, onClick, label, sub, last }) {

    // Rich contentEditable editor with @-mention autocomplete.
    // Internal value format remains "@[이름](id)" for storage compatibility.
    // Mentions are rendered as styled chips inline as the user types.
    function MentionInput({ value, onChange, placeholder, rows = 3, autoFocus, className = '', style = {} }) {
      const ref = useRef(null);
      const [popup, setPopup] = useState(null); // { query, idx }
      useEffect(() => { if (autoFocus && ref.current) { ref.current.focus(); } }, []);

      // Convert internal format -> HTML for display
      const escape = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const toHTML = (txt) => {
        if (!txt) return '';
        const parts = txt.split(/(@\[[^\]]+\]\([a-z_]+\))/g);
        return parts.map(p => {
          const mm = p.match(/^@\[([^\]]+)\]\(([a-z_]+)\)$/);
          if (mm) {
            return `<span class="mention-chip" contenteditable="false" data-mention-id="${mm[2]}">@${escape(mm[1])}</span>`;
          }
          return escape(p).replace(/\n/g, '<br>');
        }).join('');
      };

      // Convert DOM -> internal format
      const fromDOM = (el) => {
        let out = '';
        const walk = (node) => {
          if (node.nodeType === 3) { out += node.nodeValue; return; }
          if (node.nodeType !== 1) return;
          if (node.classList && node.classList.contains('mention-chip')) {
            const id = node.getAttribute('data-mention-id');
            const name = (node.textContent || '').replace(/^@/, '');
            out += `@[${name}](${id})`;
            return;
          }
          if (node.tagName === 'BR') { out += '\n'; return; }
          if (node.tagName === 'DIV' || node.tagName === 'P') {
            if (out && !out.endsWith('\n')) out += '\n';
            node.childNodes.forEach(walk);
            return;
          }
          node.childNodes.forEach(walk);
        };
        el.childNodes.forEach(walk);
        return out;
      };

      // Initialize / sync DOM when external value changes (only if differs from current)
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const current = fromDOM(el);
        if (current !== (value || '')) {
          el.innerHTML = toHTML(value || '');
        }
        // eslint-disable-next-line
      }, [value]);

      // After every input, save selection, recompute, write back, restore selection
      const handleInput = () => {
        const el = ref.current; if (!el) return;
        const txt = fromDOM(el);
        onChange(txt);
        // Recompute mention popup state from current caret position
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) { setPopup(null); return; }
        const range = sel.getRangeAt(0);
        if (!el.contains(range.startContainer)) { setPopup(null); return; }
        // Look at text in current text node up to caret
        const node = range.startContainer;
        if (node.nodeType !== 3) { setPopup(null); return; }
        const before = node.nodeValue.slice(0, range.startOffset);
        const m = before.match(/@([\u3131-\uD79D\w가-힣]*)$/);
        if (!m) { setPopup(null); return; }
        setPopup({ query: m[1] || '', idx: 0 });
      };

      const filtered = popup ? MEMBERS.filter(mm => {
        if (!popup.query) return true;
        const q = popup.query.toLowerCase();
        return mm.name.toLowerCase().includes(q) || mm.id.toLowerCase().includes(q);
      }).slice(0, 6) : [];

      const insertMention = (member) => {
        const el = ref.current; if (!el) return;
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return;
        const range = sel.getRangeAt(0);
        const node = range.startContainer;
        if (node.nodeType !== 3) return;

        // Replace the "@query" with chip + space
        const before = node.nodeValue.slice(0, range.startOffset);
        const after = node.nodeValue.slice(range.startOffset);
        const m = before.match(/@([\u3131-\uD79D\w가-힣]*)$/);
        if (!m) return;
        const newBefore = before.slice(0, before.length - m[0].length);

        const parent = node.parentNode;
        const beforeNode = document.createTextNode(newBefore);
        const chip = document.createElement('span');
        chip.className = 'mention-chip';
        chip.setAttribute('contenteditable', 'false');
        chip.setAttribute('data-mention-id', member.id);
        chip.textContent = `@${member.name}`;
        const spaceNode = document.createTextNode('\u00A0');
        const afterNode = document.createTextNode(after);

        parent.insertBefore(beforeNode, node);
        parent.insertBefore(chip, node);
        parent.insertBefore(spaceNode, node);
        parent.insertBefore(afterNode, node);
        parent.removeChild(node);

        // Caret after the space
        const r = document.createRange();
        r.setStart(spaceNode, 1);
        r.collapse(true);
        sel.removeAllRanges();
        sel.addRange(r);

        setPopup(null);
        // Trigger onChange with updated value
        onChange(fromDOM(ref.current));
      };

      const onKeyDown = (e) => {
        if (e.isComposing || e.keyCode === 229) return;
        if (popup && filtered.length > 0) {
          if (e.key === 'ArrowDown') { e.preventDefault(); setPopup(p => ({...p, idx: (p.idx + 1) % filtered.length})); return; }
          if (e.key === 'ArrowUp')   { e.preventDefault(); setPopup(p => ({...p, idx: (p.idx - 1 + filtered.length) % filtered.length})); return; }
          if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); insertMention(filtered[popup.idx]); return; }
          if (e.key === 'Escape') { setPopup(null); return; }
        }
      };

      // Plain-text paste
      const onPaste = (e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text/plain');
        document.execCommand('insertText', false, text);
      };

      return (
        <div className="relative">
          <div
            ref={ref}
            contentEditable
            suppressContentEditableWarning
            onInput={handleInput}
            onKeyDown={onKeyDown}
            onPaste={onPaste}
            onBlur={() => setTimeout(() => setPopup(null), 150)}
            data-placeholder={placeholder}
            autoFocus={autoFocus}
            className={`rich-input ${className}`}
            style={{ minHeight: rows ? (rows * 1.5 + 0.4) + 'em' : 'auto', ...style }}
          />
          {popup && filtered.length > 0 && (
            <div className="mention-popup" style={{top: '100%', left: 0, marginTop: '2px'}}>
              {filtered.map((m, i) => (
                <button key={m.id} type="button"
                        className={`mention-popup-item ${i === popup.idx ? 'active' : ''}`}
                        onMouseDown={(e) => { e.preventDefault(); insertMention(m); }}>
                  <span style={{flex:1, color:'#2563eb', fontWeight:500}}>@{m.name}</span>
                  <span className="mention-popup-meta">{m.role}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    function CommentThread({ task, currentUser, onAddComment, onDeleteComment }) {
      const [draft, setDraft] = useState('');
      const submit = () => {
        if (!draft.trim()) return;
        onAddComment(task.id, draft.trim());
        setDraft('');
      };
      const onKey = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); submit(); }
      };
      const comments = task.comments || [];
      return (
        <div className="mt-2 ml-7 mr-2 pb-3">
          {comments.length > 0 && (
            <ul className="space-y-2.5 mb-3">
              {comments.map(c => {
                const author = memberById(c.authorId);
                const isMine = c.authorId === currentUser;
                const d = new Date(c.createdAt);
                const when = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                return (
                  <li key={c.id} className="text-xs">
                    <div className="flex items-baseline gap-2 mb-0.5">
                      <span className="font-medium" style={{color:'var(--ink)', fontSize:'12px'}}>
                        {author?.name || '—'} <span style={{color:'var(--text-muted)', fontWeight:400}}>{author?.title || ''}</span>
                      </span>
                      <span style={{color:'var(--text-faint)', fontSize:'10px'}}>{when}</span>
                      {isMine && (
                        <button onClick={() => onDeleteComment(task.id, c.id)}
                                className="ml-auto opacity-0 hover:opacity-100"
                                style={{color:'var(--text-faint)', fontSize:'10px'}}>
                          삭제
                        </button>
                      )}
                    </div>
                    <div className="text-xs leading-relaxed" style={{color:'var(--text)'}}>
                      <RichText text={c.body} />
                    </div>
                  </li>
                );
              })}
            </ul>
          )}
          <div className="rounded-sm" style={{border:'1px solid var(--border)', background:'var(--surface)'}}>
            <MentionInput
              value={draft}
              onChange={setDraft}
              placeholder="댓글 작성… (@로 멤버 멘션, ⌘+Enter 등록)"
              rows={2}
              className="w-full bg-transparent text-xs px-3 py-2 outline-none resize-none leading-relaxed"
              style={{color:'var(--text)', minHeight:'52px'}}
            />
            <div className="flex items-center justify-between px-3 py-1.5" style={{borderTop:'1px solid var(--border)'}}>
              <span className="text-[10px] tracking-wide" style={{color:'var(--text-faint)'}}>
                @로 멤버 멘션
              </span>
              <button onClick={submit} disabled={!draft.trim()}
                      className="text-xs px-3 py-1 rounded-sm transition disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{background:'var(--ink)', color:'white'}}>
                등록
              </button>
            </div>
          </div>
        </div>
      );
    }

                        border: '1px solid ' + (active ? p.border : 'var(--border)'),
                        background: active ? p.bg : 'var(--surface)',

    function StatusButtons({ task, currentStatus, canEdit, onChange }) {
      return (
        <div className="inline-flex items-center gap-1 flex-wrap">
          {STATUS.map(s => {
            const active = s.id === currentStatus;
            const handler = (e) => {
              e.stopPropagation();
              if (!canEdit) return;
              if (active) return;
              onChange(s.id);
            };
            return (
              <button key={s.id}
                      onClick={handler}
                      disabled={!canEdit}
                      title={canEdit ? s.label : `${s.label} (담당자만 변경)`}
                      className="text-[10px] tracking-wide px-2 py-0.5 rounded-sm transition"
                      style={{
                        border: '1px solid ' + (active ? s.border : 'var(--border)'),
                        background: active ? s.bg : 'transparent',
                        color: active ? s.fg : 'var(--text-faint)',
                        fontWeight: active ? 500 : 400,
                        cursor: canEdit ? (active ? 'default' : 'pointer') : 'not-allowed',
                        opacity: !canEdit && !active ? 0.5 : 1,
                      }}>
                {s.label}
              </button>
            );
          })}
        </div>
      );

    function TaskRow({ task, showBrand, onChangeStatus, onEdit, onDelete, currentUser, onAddComment, onDeleteComment }) {
      const s = statusOf(task.status);
      const p = priorityOf(task.priority);
      const assignees = (task.assigneeIds || (task.assigneeId ? [task.assigneeId] : [])).map(memberById).filter(Boolean);
      const b = brandById(task.brandId);
      const days = task.dueDate ? daysUntil(task.dueDate) : null;
      const isDone = task.status === 'done';
      const StatusIcon = s.icon;
      const [expanded, setExpanded] = useState(false);
      const assigneeIds_ = task.assigneeIds || (task.assigneeId ? [task.assigneeId] : []);
      const isAssignee = assigneeIds_.includes(currentUser);
      const isAuthor = task.createdBy === currentUser;
      const canEditTask = isAssignee || isAuthor;
      const commentCount = (task.comments || []).length;
      const descMentions = extractMentionIds(task.description || '');
      const cmtMentions = extractMentionIds((task.comments || []).map(c => c.body).join(' '));
      const hasMentionedMe = currentUser && (descMentions.includes(currentUser) || cmtMentions.includes(currentUser));
      return (
        <li className="rounded-sm transition"
            style={{
              background:'var(--surface)',
              border:'1px solid ' + (hasMentionedMe ? '#c9a961' : 'var(--border)'),
              opacity: isDone ? 0.55 : 1
            }}>
          <div className="group flex items-start gap-3 p-3">
            <div className="mt-0.5 flex-shrink-0" title={`상태: ${s.label}`}>
              <StatusIcon size={16} strokeWidth={1.6} className={s.cls} />
            </div>
            <div className="flex-1 min-w-0 cursor-pointer" onClick={() => setExpanded(e => !e)}>
              <div className="flex items-center gap-2 mb-1 flex-wrap">
                {showBrand && b && (
                  <span className="text-[10px] px-1.5 py-0.5 rounded-sm tracking-wider"
                        style={{background:'var(--surface-2)', color:'var(--ink-soft)', border:'1px solid var(--border)'}}>
                    {b.name.split('/')[0]}
                  </span>
                )}
                <span className="text-sm" style={{color: isDone ? 'var(--text-faint)' : 'var(--ink)', textDecoration: isDone ? 'line-through' : 'none'}}>
                  {task.title}
                </span>
                {task.priority === 'high' && (
                  <span className={`text-[9px] px-1.5 py-0.5 rounded-sm border tracking-wider ${p.cls}`}>{p.label}</span>
                )}
                {hasMentionedMe && (
                  <span className="text-[9px] px-1.5 py-0.5 rounded-sm tracking-wider"
                        style={{background:'rgba(201,169,97,0.15)', color:'#a37800', border:'1px solid #d6c08a'}}>
                    @멘션
                  </span>
                )}
              </div>
              {task.description && (
                <p className="text-xs mt-1 leading-relaxed" style={{color:'var(--text-muted)'}}>
                  <RichText text={task.description} />
                </p>
              )}
              <div className="flex items-center gap-3 mt-1.5 text-[10px] tracking-wide flex-wrap" style={{color:'var(--text-muted)'}}>
                <StatusButtons task={task} currentStatus={task.status}
                  canEdit={isAssignee}
                  onChange={(next) => onChangeStatus && onChangeStatus(task.id, next)} />
                {assignees.length > 0 && (
                  <span className="flex items-center gap-1">
                    <UsersI size={9} strokeWidth={1.5} />
                    {assignees.length === 1
                      ? `${assignees[0].name} ${assignees[0].title}`
                      : assignees.length === 2
                        ? `${assignees[0].name} · ${assignees[1].name}`
                        : `${assignees[0].name} 외 ${assignees.length - 1}명`}
                  </span>
                )}
                {task.dueDate && (
                  <span className="flex items-center gap-1 tabular-nums"
                        style={{color: isDone ? 'var(--text-faint)' : days < 0 ? '#a83247' : days <= 3 ? '#a37800' : 'var(--text-muted)'}}>
                    <CalendarI size={9} strokeWidth={1.5} />
                    {fmtDate(task.dueDate)}
                    {!isDone && days !== null && (
                      <span className="ml-0.5">({days < 0 ? `${Math.abs(days)}일 지연` : days === 0 ? '오늘' : `D-${days}`})</span>
                    )}
                  </span>
                )}
                <span className="flex items-center gap-1 transition hover:text-zinc-700"
                      style={{color: commentCount > 0 ? 'var(--ink-soft)' : 'var(--text-faint)'}}>
                  💬 {commentCount}
                </span>
              </div>
            </div>
            {canEditTask && (
              <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition flex-shrink-0">
                <button onClick={onEdit} className="p-1 transition" style={{color:'var(--text-muted)'}}
                        onMouseEnter={(e)=>e.currentTarget.style.color='var(--ink)'}
                        onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}
                        title="수정">
                  <Edit3 size={13} strokeWidth={1.5} />
                </button>
                <button onClick={onDelete} className="p-1 transition" style={{color:'var(--text-muted)'}}
                        onMouseEnter={(e)=>e.currentTarget.style.color='#a83247'}
                        onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}
                        title="삭제">
                  <Trash2 size={13} strokeWidth={1.5} />
                </button>
              </div>
            )}
          </div>
          {expanded && onAddComment && (
            <div style={{borderTop: '1px solid var(--border)'}}>
              <CommentThread task={task} currentUser={currentUser}
                             onAddComment={onAddComment} onDeleteComment={onDeleteComment} />
            </div>
          )}
        </li>
      );
    }

    function InlineTaskForm({ brandId, onSubmit, onCancel }) {
      const [title, setTitle] = useState('');
      const [description, setDescription] = useState('');
      const [assigneeIds, setAssigneeIds] = useState([]);
      const [dueDate, setDueDate] = useState('');
      const [priority, setPriority] = useState('normal');
      const submit = (e) => {
        e.preventDefault();
        if (!title.trim() || assigneeIds.length === 0) return;
        onSubmit({ brandId, title: title.trim(), description: description.trim(), assigneeIds, dueDate, priority, status: 'pending' });
      };
      return (
        <form onSubmit={submit} className="rounded-sm p-4 space-y-3"
              style={{border:'1px solid var(--border)', background:'var(--surface-2)'}}>
          <input type="text" placeholder="작업 제목 *" value={title} onChange={e => setTitle(e.target.value)} autoFocus
                 className="w-full bg-transparent text-sm py-2 outline-none transition"
                 style={{color:'var(--ink)', borderBottom:'1px solid var(--border-strong)'}} />
          <MentionInput
            value={description}
            onChange={setDescription}
            placeholder="세부 내용 (선택, @로 멤버 멘션)"
            rows={2}
            className="w-full bg-transparent text-xs py-2 outline-none resize-none leading-relaxed"
            style={{color:'var(--text)', borderBottom:'1px solid var(--border-strong)'}} />
          <FormField label="담당자 *">
            <MultiAssigneePicker brandId={brandId} value={assigneeIds} onChange={setAssigneeIds} />
          </FormField>
          <div className="grid grid-cols-2 gap-3">
            <FormField label="마감">
              <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                     className="w-full rounded-sm px-2 py-1.5 text-xs outline-none transition"
                     style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}} />
            </FormField>
            <FormField label="우선순위">
              <PriorityButtons value={priority} onChange={setPriority} />
            </FormField>
          </div>
          <div className="flex items-center justify-end pt-2 flex-wrap gap-2">
            <div className="flex gap-2">
              <button type="button" onClick={onCancel} className="text-xs px-3 py-1.5 transition" style={{color:'var(--text-muted)'}}>취소</button>
              <button type="submit" disabled={!title.trim() || assigneeIds.length === 0}
                      className="text-xs px-4 py-1.5 rounded-sm transition disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{background:'var(--ink)', color:'white'}}>
                등록
              </button>
            </div>
          </div>
        </form>
      );

    function FormField({ label, children }) {
      return (
        <div>
          <label className="text-[10px] tracking-[0.2em] uppercase mb-1 block font-eyebrow" style={{color:'var(--text-faint)'}}>{label}</label>
          {children}
        </div>
      );
    }

    function MultiAssigneePicker({ brandId, value, onChange }) {
      const brand = brandId ? brandById(brandId) : null;
      const podMemberIds = brand ? (PARTS.find(p => p.id === brand.part)?.members || []) : [];
      const leadIds = MEMBERS.filter(m => m.group === 'head').map(m => m.id);
      const optionIds = brand ? [...leadIds, ...podMemberIds] : MEMBERS.map(m => m.id);
      const options = optionIds.map(memberById).filter(Boolean);
      const toggle = (id) => {
        if (value.includes(id)) onChange(value.filter(x => x !== id));
        else onChange([...value, id]);
      };
      // Auto-prune assignees not in valid set when brand changes
      useEffect(() => {
        if (!brand) return;
        const valid = new Set(optionIds);
        const next = value.filter(id => valid.has(id));
        if (next.length !== value.length) onChange(next);
        // eslint-disable-next-line
      }, [brandId]);
      return (
        <div>
          {!brand && (
            <p className="text-[10px] mb-1.5" style={{color:'var(--text-faint)'}}>브랜드를 먼저 선택하세요</p>
          )}
          <div className="flex flex-wrap gap-1.5">
            {options.map(m => {
              const selected = value.includes(m.id);
              const isLead = m.group === 'head';
              return (
                <button key={m.id} type="button" onClick={() => toggle(m.id)}
                        className="text-xs px-2.5 py-1 rounded-full transition tracking-wide flex items-center gap-1"
                        style={{
                          background: selected ? 'var(--ink)' : 'var(--surface)',
                          color: selected ? 'white' : 'var(--text)',
                          border: '1px solid ' + (selected ? 'var(--ink)' : 'var(--border-strong)'),
                        }}>
                  {selected && <span style={{fontSize:'9px'}}>✓</span>}
                  <span>{m.name}</span>
                  <span style={{opacity: 0.65, fontSize:'11px'}}>{m.title}</span>
                  {isLead && <span style={{opacity:0.5, fontSize:'10px'}}>·{m.role}</span>}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    /* ============================================================
       FULL TASK FORM MODAL
       ============================================================ */
    function TaskFormModal({ mode, initial, initialBrand, onClose, onSubmit }) {
      const [title, setTitle] = useState(initial?.title || '');
      const [description, setDescription] = useState(initial?.description || '');
      const [brandId, setBrandId] = useState(initial?.brandId || initialBrand || '');
      const [assigneeIds, setAssigneeIds] = useState(initial?.assigneeIds || (initial?.assigneeId ? [initial.assigneeId] : []));
      const [dueDate, setDueDate] = useState(initial?.dueDate || '');
      const [priority, setPriority] = useState(initial?.priority || 'normal');
      const submit = (e) => {
        e.preventDefault();
        if (!title.trim() || !brandId || assigneeIds.length === 0) return;
        onSubmit({ title: title.trim(), description: description.trim(), brandId, assigneeIds, dueDate, priority, status: initial?.status || 'pending' });
      };
      return (
        <Modal onClose={onClose}>
          <div className="px-8 py-6" style={{borderBottom:'1px solid var(--border)'}}>
            <div className="text-[10px] tracking-[0.3em] uppercase mb-1.5 font-eyebrow" style={{color:'var(--text-faint)'}}>
              {mode === 'create' ? 'New Task' : 'Edit Task'}
            </div>
            <h2 className="font-display text-2xl tracking-tight" style={{color:'var(--ink)'}}>
              {mode === 'create' ? '새 작업 추가' : '작업 수정'}
            </h2>
          </div>
          <form onSubmit={submit} className="px-8 py-6 space-y-5 overflow-y-auto" style={{ maxHeight: '70vh' }}>
            <FormField label="작업 제목 *">
              <input type="text" value={title} onChange={e => setTitle(e.target.value)} autoFocus
                     className="w-full bg-transparent text-sm py-2 outline-none transition"
                     style={{color:'var(--ink)', borderBottom:'1px solid var(--border-strong)'}}
                     placeholder="예: Q3 리뉴얼 패키지 시안 컨펌" />
            </FormField>
            <FormField label="브랜드 *">
              <select value={brandId} onChange={e => setBrandId(e.target.value)}
                      className="w-full rounded-sm px-3 py-2 text-sm outline-none transition"
                      style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}}>
                <option value="">— 브랜드 선택 —</option>
                {(() => {
                  const podLock = (initial?.assigneeIds || []).map(memberById).find(m => m && m.group !== 'head');
                  const podFilter = podLock ? podLock.group : null;
                  return PARTS.filter(p => !podFilter || p.id === podFilter).map(part => (
                    <optgroup key={part.id} label={part.labelKo}>
                      {BRANDS.filter(b => b.part === part.id).map(b => (
                        <option key={b.id} value={b.id}>{b.name.split('/')[0]}</option>
                      ))}
                    </optgroup>
                  ));
                })()}
              </select>
            </FormField>
            <FormField label="세부 내용">
              <MentionInput
                value={description}
                onChange={setDescription}
                placeholder="배경, 컨텍스트, 결과물 형태 (@로 멤버 멘션)"
                rows={3}
                className="w-full rounded-sm px-3 py-2 text-sm outline-none transition leading-relaxed"
                style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}} />
            </FormField>
            <FormField label="담당자 *">
              <MultiAssigneePicker brandId={brandId} value={assigneeIds} onChange={setAssigneeIds} />
            </FormField>
            <div className="grid grid-cols-2 gap-4">
              <FormField label="마감일">
                <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                       className="w-full rounded-sm px-2 py-1.5 text-xs outline-none transition"
                       style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}} />
              </FormField>
              <FormField label="우선순위">
                <PriorityButtons value={priority} onChange={setPriority} />
              </FormField>
            </div>
            <div className="flex items-center justify-end gap-3 pt-4" style={{borderTop:'1px solid var(--border)'}}>
              <button type="button" onClick={onClose} className="text-sm px-4 py-2 transition" style={{color:'var(--text-muted)'}}>취소</button>
              <button type="submit" disabled={!title.trim() || !brandId || assigneeIds.length === 0}
                      className="text-sm px-5 py-2 rounded-sm transition disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{background:'var(--ink)', color:'white'}}>
                {mode === 'create' ? '작업 등록' : '저장'}
              </button>
            </div>
          </form>
        </Modal>
      );
    }

    /* ============================================================
       MODAL SHELL
       ============================================================ */
    function Modal({ children, onClose }) {
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, [onClose]);
      // Render to document.body via portal so parent stacking contexts
      // (e.g. header backdrop-filter) cannot trap our fixed-position layer.
      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
             style={{background:'rgba(30,39,70,0.32)', backdropFilter:'blur(4px)'}}
             onClick={onClose}>
          <div className="w-full max-w-3xl rounded-sm shadow-2xl"
               style={{background:'var(--surface)', border:'1px solid var(--border)', maxHeight:'90vh', overflowY:'auto'}}
               onClick={e => e.stopPropagation()}>
            {children}
          </div>
        </div>,
        document.body
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
