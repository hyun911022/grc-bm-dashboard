  <style>
    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --surface-2: #f5f2ec;
      --border: #e8e3d8;
      --border-strong: #d6cfbf;
      --ink: #1e2746;
      --ink-soft: #2c3552;
      --text: #1f1f1f;
      --text-muted: #767470;
      --text-faint: #a8a59f;
      --accent: #1e2746;
      --accent-soft: #5d6584;
      --warm: #b8a684;
    }
    html, body { background: var(--bg); color: var(--text); }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .font-serif-display { font-family: 'Cormorant Garamond', 'Noto Serif KR', 'Apple SD Gothic Neo', serif; }
    .font-serif-kr { font-family: 'Noto Serif KR', 'Apple SD Gothic Neo', serif; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d6cfbf; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b8b0a0; }
    input[type="date"] { color-scheme: light; }
    /* Smooth accordion */
    .acc-content { overflow: hidden; transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>

    /* ---------- HELPERS ---------- */
    const memberById = (id) => MEMBERS.find(m => m.id === id);
    const brandById  = (id) => BRANDS.find(b => b.id === id);
    const statusOf   = (id) => STATUS.find(s => s.id === id) || STATUS[0];
    const priorityOf = (id) => PRIORITY.find(p => p.id === id) || PRIORITY[1];

    const todayKST = () => {
      const d = new Date();
      const kst = new Date(d.getTime() + 9 * 3600000 - d.getTimezoneOffset() * 60000);
      return kst.toISOString().slice(0, 10);
    };
    const fmtDate = (iso) => {
      if (!iso) return null;
      const d = new Date(iso + 'T00:00:00+09:00');
      return `${d.getMonth()+1}/${d.getDate()}`;
    };
    const daysUntil = (iso) => {
      if (!iso) return null;
      const t = new Date(todayKST() + 'T00:00:00+09:00').getTime();
      const d = new Date(iso + 'T00:00:00+09:00').getTime();
      return Math.round((d - t) / 86400000);
    };
    const newId = () => 't_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

    /* ============================================================
       MAIN APP
       ============================================================ */
    function App() {
      const [view, setView] = useState('brands');
      const [tasks, setTasks] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [openBrand, setOpenBrand] = useState(null);
      const [openMember, setOpenMember] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [expandedParts, setExpandedParts] = useState(new Set());
      const [showHidden, setShowHidden] = useState(false);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) setTasks(JSON.parse(raw));
        } catch (e) {}
        setLoaded(true);
      }, []);

      const persist = (next) => {
        setTasks(next);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); }
        catch (e) { console.error(e); }
      };

      const addTask = (data) => {
        const t = {
          id: newId(),
          brandId: data.brandId,
          title: data.title,
          description: data.description || '',
          assigneeId: data.assigneeId,
          dueDate: data.dueDate || '',
          priority: data.priority || 'normal',
          status: data.status || 'pending',
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        };
        persist([t, ...tasks]);
      };
      const updateTask = (id, patch) =>
        persist(tasks.map(t => t.id === id ? { ...t, ...patch, updatedAt: new Date().toISOString() } : t));
      const deleteTask = (id) => persist(tasks.filter(t => t.id !== id));
      const cycleStatus = (id) => {
        const t = tasks.find(x => x.id === id);
        if (!t) return;
        const order = ['pending', 'in_progress', 'review', 'done'];
        const idx = order.indexOf(t.status);
        updateTask(id, { status: order[(idx + 1) % order.length] });
      };

      const togglePart = (id) => {
        setExpandedParts(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          return next;
        });
      };

      const stats = useMemo(() => {
        const byBrand = {}, byBrandActive = {}, byMember = {}, byMemberActive = {};
        const byPart = {}, byPartActive = {};
        tasks.forEach(t => {
          byBrand[t.brandId] = (byBrand[t.brandId] || 0) + 1;
          if (t.status !== 'done') byBrandActive[t.brandId] = (byBrandActive[t.brandId] || 0) + 1;
          if (t.assigneeId) {
            byMember[t.assigneeId] = (byMember[t.assigneeId] || 0) + 1;
            if (t.status !== 'done') byMemberActive[t.assigneeId] = (byMemberActive[t.assigneeId] || 0) + 1;
          }
          const b = brandById(t.brandId);
          if (b) {
            byPart[b.part] = (byPart[b.part] || 0) + 1;
            if (t.status !== 'done') byPartActive[b.part] = (byPartActive[b.part] || 0) + 1;
          }
        });
        const active = tasks.filter(t => t.status !== 'done').length;
        const inProgress = tasks.filter(t => t.status === 'in_progress').length;
        const overdue = tasks.filter(t => t.status !== 'done' && t.dueDate && daysUntil(t.dueDate) < 0).length;
        return { byBrand, byBrandActive, byMember, byMemberActive, byPart, byPartActive, active, inProgress, overdue, total: tasks.length };
      }, [tasks]);

      if (!loaded) {
        return (
          <div className="min-h-screen flex items-center justify-center" style={{background:'var(--bg)', color:'var(--text-faint)'}}>
            <div className="text-xs tracking-[0.3em] uppercase">Loading</div>
          </div>
        );
      }

      return (
        <div className="min-h-screen" style={{background:'var(--bg)', color:'var(--text)'}}>
          <Header
            view={view} setView={setView}
            stats={stats}
            showHidden={showHidden} setShowHidden={setShowHidden}
            onNew={() => setShowAdd(true)}
          />

          <main className="max-w-6xl mx-auto px-8 py-12">
            {view === 'brands' ? (
              <BrandsView
                tasks={tasks}
                stats={stats}
                expandedParts={expandedParts}
                onTogglePart={togglePart}
                showHidden={showHidden}
                onOpenBrand={(id) => setOpenBrand(id)}
              />
            ) : (
              <MembersView
                tasks={tasks}
                stats={stats}
                showHidden={showHidden}
                onOpenMember={(id) => setOpenMember(id)}
              />
            )}
          </main>

          <footer className="max-w-6xl mx-auto px-8 py-10 text-xs tracking-[0.25em] uppercase border-t" style={{color:'var(--text-faint)', borderColor:'var(--border)'}}>
            Grace International · Brand Management · Operations Console
          </footer>

          {openBrand && (
            <BrandModal
              brandId={openBrand}
              tasks={tasks.filter(t => t.brandId === openBrand)}
              onClose={() => setOpenBrand(null)}
              onAdd={addTask} onUpdate={updateTask} onDelete={deleteTask}
              onCycleStatus={cycleStatus} onEdit={(t) => setEditingTask(t)}
            />
          )}
          {openMember && (
            <MemberModal
              memberId={openMember}
              tasks={tasks.filter(t => t.assigneeId === openMember)}
              onClose={() => setOpenMember(null)}
              onUpdate={updateTask} onDelete={deleteTask}
              onCycleStatus={cycleStatus} onEdit={(t) => setEditingTask(t)}
            />
          )}
          {showAdd && (
            <TaskFormModal
              mode="create" initialBrand={null}
              onClose={() => setShowAdd(false)}
              onSubmit={(data) => { addTask(data); setShowAdd(false); }}
            />
          )}
          {editingTask && (
            <TaskFormModal
              mode="edit" initial={editingTask}
              onClose={() => setEditingTask(null)}
              onSubmit={(data) => { updateTask(editingTask.id, data); setEditingTask(null); }}
            />
          )}
        </div>
      );
    }

    /* ============================================================
       HEADER (Grace-style brand bar)
       ============================================================ */
    function Header({ view, setView, stats, showHidden, setShowHidden, onNew }) {
      return (
        <header className="sticky top-0 z-30 backdrop-blur" style={{background:'rgba(250,248,244,0.92)', borderBottom:'1px solid var(--border)'}}>
          {/* Top brand bar */}
          <div className="max-w-6xl mx-auto px-8 pt-8 pb-6 flex items-end justify-between flex-wrap gap-4">
            <div className="flex items-center gap-5">
              <img src={LOGO_SRC} alt="Grace International"
                   style={{height:'24px', width:'auto', filter:'none'}}
                   className="opacity-90" />
              <span className="hidden md:inline-block w-px h-6" style={{background:'var(--border-strong)'}}></span>
              <div className="hidden md:block">
                <div className="text-xs tracking-[0.35em] uppercase font-light" style={{color:'var(--text-muted)'}}>
                  Brand Management
                </div>
                <div className="text-xs tracking-wider mt-0.5" style={{color:'var(--text-faint)'}}>
                  부서 운영 콘솔
                </div>
              </div>
            </div>
            <div className="flex items-center gap-7 text-xs" style={{color:'var(--text-muted)'}}>
              <Stat label="전체" value={stats.total} />
              <span className="w-px h-4" style={{background:'var(--border-strong)'}}></span>
              <Stat label="진행중" value={stats.inProgress} highlight />
              <span className="w-px h-4" style={{background:'var(--border-strong)'}}></span>
              <Stat label="활성" value={stats.active} highlight />
              {stats.overdue > 0 && (
                <>
                  <span className="w-px h-4" style={{background:'var(--border-strong)'}}></span>
                  <Stat label="지연" value={stats.overdue} danger />
                </>
              )}
            </div>
          </div>

          {/* Tab + actions row */}
          <div className="max-w-6xl mx-auto px-8 flex items-center justify-between flex-wrap" style={{borderTop:'1px solid var(--border)'}}>
            <div className="flex">
              <TabBtn active={view === 'brands'}  onClick={() => setView('brands')}  label="브랜드" sub="Brands" />
              <TabBtn active={view === 'members'} onClick={() => setView('members')} label="담당자" sub="People" />
            </div>
            <div className="flex items-center gap-2 py-3">
              <button
                onClick={() => setShowHidden(s => !s)}
                className="text-xs px-3.5 py-1.5 rounded-full border transition tracking-wide"
                style={{
                  borderColor: showHidden ? 'var(--ink)' : 'var(--border)',
                  background: showHidden ? 'var(--ink)' : 'transparent',
                  color: showHidden ? 'white' : 'var(--text-muted)',
                }}
              >
                완료 {showHidden ? '표시' : '숨김'}
              </button>
              <button
                onClick={onNew}
                className="text-xs px-4 py-1.5 rounded-full transition tracking-wide flex items-center gap-1.5"
                style={{background:'var(--ink)', color:'white'}}
                onMouseEnter={(e) => e.currentTarget.style.background='var(--ink-soft)'}
                onMouseLeave={(e) => e.currentTarget.style.background='var(--ink)'}
              >
                <Plus size={12} strokeWidth={2.2} /> 새 작업
              </button>
            </div>
          </div>
        </header>
      );

    function Stat({ label, value, highlight, danger }) {
      const valColor = danger ? 'var(--ink)' : highlight ? 'var(--ink)' : 'var(--ink-soft)';
      return (
        <div className="flex items-baseline gap-2">
          <span className="tracking-[0.2em] uppercase font-light" style={{fontSize:'10px', color: danger ? '#a83247' : 'var(--text-muted)'}}>{label}</span>
          <span className="text-base tabular-nums font-light" style={{color: danger ? '#a83247' : valColor}}>{value}</span>
        </div>
      );
    }

    function TabBtn({ active, onClick, label, sub }) {
      return (
        <button
          onClick={onClick}
          className="px-1 py-4 mr-10 transition group relative"
        >
          <div className="flex items-baseline gap-2">
            <span className={`text-sm tracking-wider transition ${active ? '' : 'group-hover:opacity-70'}`}
                  style={{color: active ? 'var(--ink)' : 'var(--text-muted)', fontWeight: active ? 500 : 400}}>
              {label}
            </span>
            <span className="text-xs tracking-[0.25em] uppercase font-serif-display italic" style={{color:'var(--text-faint)'}}>
              {sub}
            </span>
          </div>
          <span
            className="absolute bottom-0 left-0 h-px transition-all"
            style={{width: active ? '100%' : '0%', background:'var(--ink)'}}
          ></span>
        </button>

    /* ============================================================
       BRANDS VIEW (Accordion: parts collapse; click to expand)
       ============================================================ */
    function BrandsView({ tasks, stats, expandedParts, onTogglePart, showHidden, onOpenBrand }) {
      return (
        <div className="space-y-5">
          <SectionLabel
            eyebrow="Section 01"
            title="브랜드 포트폴리오"
            sub="파트별로 묶인 36개 브랜드. 파트를 눌러 펼치세요."
          />
          {PARTS.map(part => (
            <PartAccordion

              part={part}
              members={part.members.map(memberById)}
              brands={BRANDS.filter(b => b.part === part.id)}
              tasks={tasks}
              stats={stats}
              expanded={expandedParts.has(part.id)}
              onToggle={() => onTogglePart(part.id)}
              showHidden={showHidden}
              onOpenBrand={onOpenBrand}
            />

      return (
        <div className="mb-8 pb-5" style={{borderBottom:'1px solid var(--border)'}}>
          <div className="text-xs tracking-[0.3em] uppercase font-serif-display italic" style={{color:'var(--text-faint)'}}>
            {eyebrow}
          </div>
          <h2 className="font-serif-display text-3xl mt-1.5 tracking-wide font-light" style={{color:'var(--ink)'}}>
            {title}
          </h2>
          {sub && <p className="text-xs mt-2 tracking-wide" style={{color:'var(--text-muted)'}}>{sub}</p>}
        </div>
      );
    }

    function PartAccordion({ part, members, brands, tasks, stats, expanded, onToggle, showHidden, onOpenBrand }) {
      const totalTasks = stats.byPart[part.id] || 0;
      const activeTasks = stats.byPartActive[part.id] || 0;
      const priorityCount = brands.filter(b => b.priority).length;
      const activeBrands = brands.filter(b => b.active).length;
      const ref = useRef(null);

      return (
        <div className="rounded-sm transition-shadow"
             style={{
               background:'var(--surface)',
               border:'1px solid var(--border)',
               boxShadow: expanded ? '0 1px 0 0 var(--border) inset, 0 8px 24px -16px rgba(30,39,70,0.18)' : 'none'
             }}>
          {/* Header */}
          <button
            onClick={onToggle}
            className="w-full text-left px-7 py-6 flex items-center justify-between gap-6 group transition"
            onMouseEnter={(e) => e.currentTarget.style.background='var(--surface-2)'}
            onMouseLeave={(e) => e.currentTarget.style.background='transparent'}
          >
            <div className="flex items-baseline gap-5 min-w-0 flex-wrap">
              <span className="font-serif-display text-2xl font-light tracking-wider" style={{color:'var(--ink)'}}>
                {part.label}
              </span>
              <span className="text-sm tracking-wider" style={{color:'var(--text-muted)'}}>{part.labelKo}</span>
              <span className="hidden md:inline w-px h-4" style={{background:'var(--border-strong)'}}></span>
              <span className="text-xs tracking-wide" style={{color:'var(--text-muted)'}}>
                {members.map((m, i) => (
                  <span key={m.id}>
                    {m.name} <span style={{color:'var(--text-faint)'}}>{m.title}</span>
                    {i < members.length - 1 && <span style={{color:'var(--text-faint)'}}> · </span>}
                  </span>
                ))}
              </span>
            </div>
            <div className="flex items-center gap-6 flex-shrink-0">
              <div className="hidden sm:flex items-center gap-5 text-xs" style={{color:'var(--text-muted)'}}>
                <span className="flex items-baseline gap-1.5">
                  <span style={{fontSize:'10px'}} className="tracking-[0.2em] uppercase">브랜드</span>
                  <span className="tabular-nums text-sm font-light" style={{color:'var(--ink)'}}>{brands.length}</span>
                </span>
                {priorityCount > 0 && (
                  <span className="flex items-baseline gap-1.5">
                    <span style={{fontSize:'10px'}} className="tracking-[0.2em] uppercase">중점</span>
                    <span className="tabular-nums text-sm font-light" style={{color:'var(--ink)'}}>{priorityCount}</span>
                  </span>
                )}
                {activeTasks > 0 && (
                  <span className="flex items-baseline gap-1.5">
                    <span style={{fontSize:'10px'}} className="tracking-[0.2em] uppercase">진행</span>
                    <span className="tabular-nums text-sm font-light" style={{color:'var(--ink)'}}>{activeTasks}</span>
                  </span>

              <span className="transition-transform" style={{transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)', color:'var(--ink)'}}>
                <ChevronDown size={18} strokeWidth={1.5} />

            </div>
          </button>
          {/* Body */}
          <div
            className="acc-content"
            style={{ maxHeight: expanded ? (ref.current?.scrollHeight ? ref.current.scrollHeight + 'px' : '2000px') : '0px' }}
          >
            <div ref={ref} className="px-7 pt-2 pb-7" style={{borderTop:'1px solid var(--border)'}}>
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 pt-5">
                {brands.map(b => (
                  <BrandCard
                    key={b.id}
                    brand={b}
                    total={stats.byBrand[b.id] || 0}
                    active={stats.byBrandActive[b.id] || 0}
                    brandTasks={tasks.filter(t => t.brandId === b.id && (showHidden || t.status !== 'done'))}
                    onClick={() => onOpenBrand(b.id)}

                ))}
              </div>
            </div>
          </div>
        </div>

    function BrandCard({ brand, total, active, brandTasks, onClick }) {
      const breakdown = STATUS.map(s => ({
        ...s, count: brandTasks.filter(t => t.status === s.id).length
      }));
      return (
        <button
          onClick={onClick}
          className="group relative text-left rounded-sm p-4 min-h-[110px] flex flex-col justify-between transition"
          style={{
            background:'var(--surface)',
            border: '1px solid var(--border)',
            boxShadow: brand.priority ? 'inset 0 0 0 1px rgba(30,39,70,0.08)' : 'none',
          }}
          onMouseEnter={(e) => { e.currentTarget.style.borderColor='var(--ink)'; e.currentTarget.style.background='var(--surface-2)'; }}
          onMouseLeave={(e) => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.background='var(--surface)'; }}
        >
          <div className="absolute top-2.5 right-2.5 flex items-center gap-1">
            {brand.priority && (
              <span title="중점 브랜드" style={{color:'var(--ink)'}}>
                <StarI size={10} strokeWidth={1.4} fillCurrent />
              </span>
            )}
            {brand.active && (
              <span title="신규/액티브" className="w-1.5 h-1.5 rounded-full" style={{background:'#7a8c5e'}}></span>
            )}
            {brand.region && (
              <span className="text-[9px] tracking-widest px-1 py-px rounded-sm"
                    style={{color:'var(--text-faint)', border:'1px solid var(--border-strong)'}}>
                {brand.region}
              </span>

          </div>
          <div>
            <h3 className="text-base mb-1"
                style={{color:'var(--ink)', fontWeight: brand.priority ? 500 : 400}}>
              {brand.name}

            <p className="text-[10px] tracking-[0.2em] uppercase font-serif-display italic" style={{color:'var(--text-faint)'}}>
              {active > 0 ? `Active · ${active}` : 'No tasks'}
            </p>
          </div>
          <div className="mt-3 flex items-center justify-between">
            <div className="flex items-center gap-2">
              {breakdown.filter(s => s.count > 0).map(s => (
                <span key={s.id} className="flex items-center gap-1 text-[10px]" style={{color:'var(--text-muted)'}}>
                  <span className={`w-1.5 h-1.5 rounded-full ${s.dot}`}></span>
                  {s.count}
                </span>
              ))}
              {total === 0 && <span style={{color:'var(--text-faint)', fontSize:'11px'}}>—</span>}
            </div>
            <ChevronRight size={13} className="transition group-hover:translate-x-0.5" strokeWidth={1.5} style={{color:'var(--text-faint)'}} />
          </div>
        </button>
      );
    }

    /* ============================================================
       MEMBERS VIEW — uniform compact cards
       ============================================================ */
    function MembersView({ tasks, stats, showHidden, onOpenMember }) {
      return (
        <div className="space-y-10">
          <SectionLabel
            eyebrow="Section 02"
            title="담당자별 아젠다"
            sub="모든 부서원의 진행중 작업을 한눈에. 카드를 눌러 상세를 확인하세요."
          />

          {/* Leadership */}
          <div>
            <GroupHeader text="Leadership" sub="부서장 · 팀장" />
            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
              {MEMBERS.filter(m => m.group === 'head').map(m => (
                <MemberCard
                  key={m.id}
                  member={m}
                  total={stats.byMember[m.id] || 0}
                  active={stats.byMemberActive[m.id] || 0}
                  tasks={tasks.filter(t => t.assigneeId === m.id && (showHidden || t.status !== 'done'))}
                  onClick={() => onOpenMember(m.id)}
                />
              ))}
            </div>
          </div>

          {PARTS.map(part => (
            <div key={part.id}>
              <GroupHeader text={part.label} sub={part.labelKo} />
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                {part.members.map(memberById).map(m => (
                  <MemberCard
                    key={m.id}
                    member={m}
                    total={stats.byMember[m.id] || 0}
                    active={stats.byMemberActive[m.id] || 0}
                    tasks={tasks.filter(t => t.assigneeId === m.id && (showHidden || t.status !== 'done'))}
                    onClick={() => onOpenMember(m.id)}
                  />
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function GroupHeader({ text, sub }) {
      return (
        <div className="mb-4 flex items-baseline gap-3 pb-2" style={{borderBottom:'1px solid var(--border)'}}>
          <span className="font-serif-display text-lg font-light tracking-wider" style={{color:'var(--ink)'}}>{text}</span>
          <span className="text-xs tracking-wider" style={{color:'var(--text-muted)'}}>{sub}</span>
        </div>
      );
    }

    function MemberCard({ member, total, active, tasks, onClick }) {
      const upcoming = tasks
        .filter(t => t.dueDate && t.status !== 'done')
        .sort((a, b) => a.dueDate.localeCompare(b.dueDate))
        .slice(0, 2);
      const isLead = member.group === 'head';
      return (
        <button
          onClick={onClick}
          className="group text-left rounded-sm p-4 transition"
          style={{
            background:'var(--surface)',
            border:'1px solid var(--border)',
            minHeight: '140px',
          }}
          onMouseEnter={(e) => { e.currentTarget.style.borderColor='var(--ink)'; e.currentTarget.style.background='var(--surface-2)'; }}
          onMouseLeave={(e) => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.background='var(--surface)'; }}
        >
          <div className="flex items-start justify-between mb-3">
            <div className="min-w-0">
              <div className="flex items-center gap-1.5 mb-1">
                {isLead && (
                  <span style={{color:'var(--ink)'}}>
                    {member.role === '부서장' ? <CrownI size={12} strokeWidth={1.4} /> : <ShieldI size={12} strokeWidth={1.4} />}
                  </span>
                )}
                <span className="text-[10px] tracking-[0.2em] uppercase" style={{color:'var(--text-faint)'}}>
                  {member.role}
                </span>
              </div>
              <div className="flex items-baseline gap-1.5">
                <h3 className="text-base font-medium" style={{color:'var(--ink)'}}>{member.name}</h3>
                <span className="text-xs" style={{color:'var(--text-muted)'}}>{member.title}</span>
              </div>
            </div>
            <div className="text-right flex-shrink-0">
              <div className="font-serif-display text-2xl font-light tabular-nums" style={{color:'var(--ink)'}}>{active}</div>
              <div className="text-[9px] tracking-[0.2em] uppercase font-serif-display italic" style={{color:'var(--text-faint)'}}>active</div>
            </div>
          </div>
          <div className="pt-2.5" style={{borderTop:'1px solid var(--border)'}}>
            {upcoming.length > 0 ? (
              <ul className="space-y-1">
                {upcoming.map(t => {
                  const days = daysUntil(t.dueDate);
                  return (
                    <li key={t.id} className="flex items-center justify-between gap-2 text-xs">
                      <div className="flex items-center gap-1.5 min-w-0">
                        <span className={`w-1 h-1 rounded-full flex-shrink-0 ${statusOf(t.status).dot}`}></span>
                        <span className="truncate" style={{color:'var(--text)'}}>{t.title}</span>
                      </div>
                      <span className="text-[10px] flex-shrink-0 tabular-nums"
                            style={{color: days < 0 ? '#a83247' : days <= 3 ? '#a37800' : 'var(--text-faint)'}}>
                        {fmtDate(t.dueDate)}
                      </span>
                    </li>
                  );
                })}
              </ul>
            ) : (
              <p className="text-[11px] tracking-wide" style={{color:'var(--text-faint)'}}>예정 작업 없음</p>
            )}
          </div>
          <div className="mt-3 flex items-center justify-between text-[10px] tracking-wide" style={{color:'var(--text-faint)'}}>
            <span>전체 {total}건</span>
            <span className="flex items-center gap-1 transition group-hover:gap-1.5" style={{color:'var(--text-muted)'}}>
              상세 <ArrowUpRight size={10} strokeWidth={1.4} />
            </span>
          </div>
        </button>
      );
    }

    /* ============================================================
       BRAND MODAL
       ============================================================ */
    function BrandModal({ brandId, tasks, onClose, onAdd, onCycleStatus, onDelete, onEdit }) {
      const brand = brandById(brandId);
      const [showForm, setShowForm] = useState(tasks.length === 0);
      const sorted = [...tasks].sort((a, b) => {
        if ((a.status === 'done') !== (b.status === 'done')) return a.status === 'done' ? 1 : -1;
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return b.createdAt.localeCompare(a.createdAt);
      });
      return (
        <Modal onClose={onClose}>
          <div className="flex items-center justify-between px-8 py-6" style={{borderBottom:'1px solid var(--border)'}}>
            <div>
              <div className="flex items-center gap-2 text-[10px] tracking-[0.3em] uppercase mb-1.5 font-serif-display italic" style={{color:'var(--text-faint)'}}>
                Brand · {PARTS.find(p => p.id === brand.part)?.label}
              </div>
              <div className="flex items-center gap-3">
                <h2 className="font-serif-display text-3xl font-light tracking-wide" style={{color:'var(--ink)'}}>
                  {brand.name}
                </h2>
                {brand.priority && <StarI size={14} strokeWidth={1.4} fillCurrent style={{color:'var(--ink)'}} />}
                {brand.active && <span className="w-1.5 h-1.5 rounded-full" style={{background:'#7a8c5e'}}></span>}
                {brand.region && (
                  <span className="text-[10px] tracking-widest px-1.5 py-0.5 rounded-sm"
                        style={{color:'var(--text-faint)', border:'1px solid var(--border-strong)'}}>
                    {brand.region}
                  </span>
                )}
              </div>
            </div>
            <button onClick={onClose} className="transition" style={{color:'var(--text-muted)'}}
                    onMouseEnter={(e)=>e.currentTarget.style.color='var(--ink)'}
                    onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}>
              <XIcon size={18} strokeWidth={1.5} />
            </button>
          </div>
          <div className="px-8 py-6 overflow-y-auto" style={{ maxHeight: '60vh' }}>
            {sorted.length === 0 && !showForm && (
              <div className="text-center py-12">
                <p className="text-sm mb-4" style={{color:'var(--text-muted)'}}>등록된 작업이 없습니다</p>
                <button
                  onClick={() => setShowForm(true)}
                  className="text-xs px-5 py-2.5 rounded-full transition tracking-wide"
                  style={{background:'var(--ink)', color:'white'}}
                >
                  + 첫 작업 추가
                </button>
              </div>
            )}
            {sorted.length > 0 && (
              <ul className="space-y-2 mb-6">
                {sorted.map(t => (
                  <TaskRow
                    key={t.id} task={t} showBrand={false}
                    onCycleStatus={() => onCycleStatus(t.id)}
                    onEdit={() => onEdit(t)}
                    onDelete={() => { if (confirm('삭제하시겠습니까?')) onDelete(t.id); }}
                  />
                ))}
              </ul>
            )}
            {showForm ? (
              <InlineTaskForm
                brandId={brand.id}
                onCancel={() => setShowForm(false)}
                onSubmit={(data) => { onAdd(data); setShowForm(false); }}
              />
            ) : (
              <button
                onClick={() => setShowForm(true)}
                className="w-full rounded-sm py-3 text-sm transition flex items-center justify-center gap-2"
                style={{border:'1px dashed var(--border-strong)', color:'var(--text-muted)'}}
                onMouseEnter={(e)=>{e.currentTarget.style.borderColor='var(--ink)';e.currentTarget.style.color='var(--ink)';}}
                onMouseLeave={(e)=>{e.currentTarget.style.borderColor='var(--border-strong)';e.currentTarget.style.color='var(--text-muted)';}}
              >
                <Plus size={14} strokeWidth={1.5} /> 새 작업 추가
              </button>
            )}
          </div>
        </Modal>
      );
    }

    /* ============================================================
       MEMBER MODAL
       ============================================================ */
    function MemberModal({ memberId, tasks, onClose, onCycleStatus, onDelete, onEdit }) {
      const m = memberById(memberId);
      const [tab, setTab] = useState('active');
      const filtered = tasks.filter(t => tab === 'done' ? t.status === 'done' : t.status !== 'done');
      const sorted = [...filtered].sort((a, b) => {
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return b.createdAt.localeCompare(a.createdAt);
      });
      const activeCount = tasks.filter(t => t.status !== 'done').length;
      const doneCount = tasks.filter(t => t.status === 'done').length;
      return (
        <Modal onClose={onClose}>
          <div className="flex items-center justify-between px-8 py-6" style={{borderBottom:'1px solid var(--border)'}}>
            <div>
              <div className="flex items-center gap-2 text-[10px] tracking-[0.3em] uppercase mb-1.5 font-serif-display italic" style={{color:'var(--text-faint)'}}>
                {m.role}
              </div>
              <div className="flex items-baseline gap-3">
                <h2 className="font-serif-display text-3xl font-light tracking-wide" style={{color:'var(--ink)'}}>{m.name}</h2>
                <span className="text-sm" style={{color:'var(--text-muted)'}}>{m.title}</span>
              </div>
            </div>
            <button onClick={onClose} className="transition" style={{color:'var(--text-muted)'}}
                    onMouseEnter={(e)=>e.currentTarget.style.color='var(--ink)'}
                    onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}>
              <XIcon size={18} strokeWidth={1.5} />
            </button>
          </div>
          <div className="px-8 pt-4 flex gap-7" style={{borderBottom:'1px solid var(--border)'}}>
            <ModalTab active={tab==='active'} onClick={() => setTab('active')} label="진행 작업" count={activeCount} />
            <ModalTab active={tab==='done'}   onClick={() => setTab('done')}   label="완료" count={doneCount} />
          </div>
          <div className="px-8 py-6 overflow-y-auto" style={{ maxHeight: '60vh' }}>
            {sorted.length === 0 ? (
              <div className="text-center py-12">
                <p className="text-sm" style={{color:'var(--text-muted)'}}>{tab === 'active' ? '진행 중인 작업이 없습니다' : '완료된 작업이 없습니다'}</p>
              </div>
            ) : (
              <ul className="space-y-2">
                {sorted.map(t => (
                  <TaskRow
                    key={t.id} task={t} showBrand={true}
                    onCycleStatus={() => onCycleStatus(t.id)}
                    onEdit={() => onEdit(t)}
                    onDelete={() => { if (confirm('삭제하시겠습니까?')) onDelete(t.id); }}
                  />
                ))}
              </ul>
            )}
          </div>
        </Modal>
      );
    }

    function ModalTab({ active, onClick, label, count }) {
      return (
        <button onClick={onClick} className="pb-3 text-sm tracking-wide transition relative">
          <span style={{color: active ? 'var(--ink)' : 'var(--text-muted)', fontWeight: active ? 500 : 400}}>
            {label} <span className="ml-1 tabular-nums" style={{color:'var(--text-faint)'}}>{count}</span>
          </span>
          {active && <span className="absolute bottom-0 left-0 right-0 h-px" style={{background:'var(--ink)'}}></span>}
        </button>
      );
    }

    /* ============================================================
       TASK ROW
       ============================================================ */
    function TaskRow({ task, showBrand, onCycleStatus, onEdit, onDelete }) {
      const s = statusOf(task.status);
      const p = priorityOf(task.priority);
      const a = memberById(task.assigneeId);
      const b = brandById(task.brandId);
      const days = task.dueDate ? daysUntil(task.dueDate) : null;
      const isDone = task.status === 'done';
      const StatusIcon = s.icon;
      return (
        <li className="group flex items-start gap-3 p-3 rounded-sm transition"
            style={{
              background:'var(--surface)',
              border:'1px solid var(--border)',
              opacity: isDone ? 0.55 : 1
            }}
            onMouseEnter={(e)=>{e.currentTarget.style.borderColor='var(--border-strong)';e.currentTarget.style.background='var(--surface-2)';}}
            onMouseLeave={(e)=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface)';}}>
          <button onClick={onCycleStatus} className={`mt-0.5 flex-shrink-0 ${s.cls} hover:scale-110 transition`} title={`상태: ${s.label}`}>
            <StatusIcon size={16} strokeWidth={1.6} />
          </button>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 mb-1 flex-wrap">
              {showBrand && b && (
                <span className="text-[10px] px-1.5 py-0.5 rounded-sm tracking-wider"
                      style={{background:'var(--surface-2)', color:'var(--ink-soft)', border:'1px solid var(--border)'}}>
                  {b.name}
                </span>
              )}
              <span className="text-sm" style={{color: isDone ? 'var(--text-faint)' : 'var(--ink)', textDecoration: isDone ? 'line-through' : 'none'}}>
                {task.title}
              </span>
              {task.priority === 'high' && (
                <span className={`text-[9px] px-1.5 py-0.5 rounded-sm border tracking-wider ${p.cls}`}>{p.label}</span>
              )}
            </div>
            {task.description && (<p className="text-xs mt-1 leading-relaxed" style={{color:'var(--text-muted)'}}>{task.description}</p>)}
            <div className="flex items-center gap-3 mt-1.5 text-[10px] tracking-wide flex-wrap" style={{color:'var(--text-muted)'}}>
              <span className={`flex items-center gap-1 ${s.cls}`}>
                <span className={`w-1 h-1 rounded-full ${s.dot}`}></span> {s.label}
              </span>
              {a && (
                <span className="flex items-center gap-1">
                  <UsersI size={9} strokeWidth={1.5} /> {a.name} {a.title}
                </span>
              )}
              {task.dueDate && (
                <span className="flex items-center gap-1 tabular-nums"
                      style={{color: isDone ? 'var(--text-faint)' : days < 0 ? '#a83247' : days <= 3 ? '#a37800' : 'var(--text-muted)'}}>
                  <CalendarI size={9} strokeWidth={1.5} />
                  {fmtDate(task.dueDate)}
                  {!isDone && days !== null && (
                    <span className="ml-0.5">({days < 0 ? `${Math.abs(days)}일 지연` : days === 0 ? '오늘' : `D-${days}`})</span>
                  )}
                </span>
              )}
            </div>
          </div>
          <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition flex-shrink-0">
            <button onClick={onEdit} className="p-1 transition" style={{color:'var(--text-muted)'}}
                    onMouseEnter={(e)=>e.currentTarget.style.color='var(--ink)'}
                    onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}
                    title="수정">
              <Edit3 size={13} strokeWidth={1.5} />
            </button>
            <button onClick={onDelete} className="p-1 transition" style={{color:'var(--text-muted)'}}
                    onMouseEnter={(e)=>e.currentTarget.style.color='#a83247'}
                    onMouseLeave={(e)=>e.currentTarget.style.color='var(--text-muted)'}
                    title="삭제">
              <Trash2 size={13} strokeWidth={1.5} />
            </button>
          </div>
        </li>
      );
    }

    /* ============================================================
       INLINE TASK FORM
       ============================================================ */
    function InlineTaskForm({ brandId, onSubmit, onCancel }) {
      const [title, setTitle] = useState('');
      const [description, setDescription] = useState('');
      const [assigneeId, setAssigneeId] = useState('');
      const [dueDate, setDueDate] = useState('');
      const [priority, setPriority] = useState('normal');
      const [status, setStatus] = useState('pending');
      const submit = (e) => {
        e.preventDefault();
        if (!title.trim() || !assigneeId) return;
        onSubmit({ brandId, title: title.trim(), description: description.trim(), assigneeId, dueDate, priority, status });
      };
      return (
        <form onSubmit={submit} className="rounded-sm p-4 space-y-3"
              style={{border:'1px solid var(--border)', background:'var(--surface-2)'}}>
          <input type="text" placeholder="작업 제목 *" value={title} onChange={e => setTitle(e.target.value)} autoFocus
                 className="w-full bg-transparent text-sm py-2 outline-none transition"
                 style={{color:'var(--ink)', borderBottom:'1px solid var(--border-strong)'}} />
          <textarea placeholder="세부 내용 (선택)" value={description} onChange={e => setDescription(e.target.value)} rows={2}
                    className="w-full bg-transparent text-xs py-2 outline-none resize-none leading-relaxed"
                    style={{color:'var(--text)', borderBottom:'1px solid var(--border-strong)'}} />
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            <FormField label="담당자 *"><AssigneeSelect value={assigneeId} onChange={setAssigneeId} /></FormField>
            <FormField label="마감">
              <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                     className="w-full rounded-sm px-2 py-1.5 text-xs outline-none transition"
                     style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}} />
            </FormField>
            <FormField label="우선순위">
              <select value={priority} onChange={e => setPriority(e.target.value)}
                      className="w-full rounded-sm px-2 py-1.5 text-xs outline-none transition"
                      style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}}>
                {PRIORITY.map(p => <option key={p.id} value={p.id}>{p.label}</option>)}
              </select>
            </FormField>
          </div>
          <div className="flex items-center justify-between pt-2 flex-wrap gap-2">
            <div className="flex gap-1.5 flex-wrap">
              {STATUS.map(s => (
                <button key={s.id} type="button" onClick={() => setStatus(s.id)}
                        className="text-[10px] px-2 py-1 rounded-sm transition tracking-wider"
                        style={{
                          border: '1px solid ' + (status === s.id ? 'var(--ink)' : 'var(--border)'),
                          background: status === s.id ? 'var(--ink)' : 'var(--surface)',
                          color: status === s.id ? 'white' : 'var(--text-muted)'
                        }}>
                  <span className={`inline-block w-1 h-1 rounded-full mr-1.5 ${s.dot}`}></span>{s.label}
                </button>
              ))}
            </div>
            <div className="flex gap-2">
              <button type="button" onClick={onCancel} className="text-xs px-3 py-1.5 transition" style={{color:'var(--text-muted)'}}>취소</button>
              <button type="submit" disabled={!title.trim() || !assigneeId}
                      className="text-xs px-4 py-1.5 rounded-sm transition disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{background:'var(--ink)', color:'white'}}>
                등록
              </button>
            </div>
          </div>
        </form>
      );
    }

    function FormField({ label, children }) {
      return (
        <div>
          <label className="text-[10px] tracking-[0.2em] uppercase mb-1 block font-serif-display italic" style={{color:'var(--text-faint)'}}>{label}</label>
          {children}
        </div>
      );
    }

    function AssigneeSelect({ value, onChange }) {
      return (
        <select value={value} onChange={e => onChange(e.target.value)}
                className="w-full rounded-sm px-2 py-1.5 text-xs outline-none transition"
                style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}}>
          <option value="">— 담당자 선택 —</option>
          <optgroup label="Leadership">
            {MEMBERS.filter(m => m.group === 'head').map(m => (
              <option key={m.id} value={m.id}>{m.name} {m.title} ({m.role})</option>
            ))}
          </optgroup>
          {PARTS.map(part => (
            <optgroup key={part.id} label={part.labelKo}>
              {part.members.map(memberById).map(m => (
                <option key={m.id} value={m.id}>{m.name} {m.title}</option>
              ))}
            </optgroup>
          ))}
        </select>
      );
    }

    /* ============================================================
       FULL TASK FORM MODAL
       ============================================================ */
    function TaskFormModal({ mode, initial, initialBrand, onClose, onSubmit }) {
      const [title, setTitle] = useState(initial?.title || '');
      const [description, setDescription] = useState(initial?.description || '');
      const [brandId, setBrandId] = useState(initial?.brandId || initialBrand || '');
      const [assigneeId, setAssigneeId] = useState(initial?.assigneeId || '');
      const [dueDate, setDueDate] = useState(initial?.dueDate || '');
      const [priority, setPriority] = useState(initial?.priority || 'normal');
      const [status, setStatus] = useState(initial?.status || 'pending');
      const submit = (e) => {
        e.preventDefault();
        if (!title.trim() || !brandId || !assigneeId) return;
        onSubmit({ title: title.trim(), description: description.trim(), brandId, assigneeId, dueDate, priority, status });
      };
      return (
        <Modal onClose={onClose}>
          <div className="px-8 py-6" style={{borderBottom:'1px solid var(--border)'}}>
            <div className="text-[10px] tracking-[0.3em] uppercase mb-1.5 font-serif-display italic" style={{color:'var(--text-faint)'}}>
              {mode === 'create' ? 'New Task' : 'Edit Task'}
            </div>
            <h2 className="font-serif-display text-2xl font-light tracking-wide" style={{color:'var(--ink)'}}>
              {mode === 'create' ? '새 작업 추가' : '작업 수정'}
            </h2>
          </div>
          <form onSubmit={submit} className="px-8 py-6 space-y-5 overflow-y-auto" style={{ maxHeight: '70vh' }}>
            <FormField label="작업 제목 *">
              <input type="text" value={title} onChange={e => setTitle(e.target.value)} autoFocus
                     className="w-full bg-transparent text-sm py-2 outline-none transition"
                     style={{color:'var(--ink)', borderBottom:'1px solid var(--border-strong)'}}
                     placeholder="예: Q3 리뉴얼 패키지 시안 컨펌" />
            </FormField>
            <FormField label="브랜드 *">
              <select value={brandId} onChange={e => setBrandId(e.target.value)}
                      className="w-full rounded-sm px-3 py-2 text-sm outline-none transition"
                      style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}}>
                <option value="">— 브랜드 선택 —</option>
                {PARTS.map(part => (
                  <optgroup key={part.id} label={part.labelKo}>
                    {BRANDS.filter(b => b.part === part.id).map(b => (
                      <option key={b.id} value={b.id}>
                        {b.name}{b.priority ? ' ★' : ''}{b.region ? ` (${b.region})` : ''}
                      </option>
                    ))}
                  </optgroup>
                ))}
              </select>
            </FormField>
            <FormField label="세부 내용">
              <textarea value={description} onChange={e => setDescription(e.target.value)} rows={3}
                        className="w-full rounded-sm px-3 py-2 text-sm outline-none transition leading-relaxed"
                        style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}}
                        placeholder="배경, 컨텍스트, 결과물 형태 등" />
            </FormField>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <FormField label="담당자 *"><AssigneeSelect value={assigneeId} onChange={setAssigneeId} /></FormField>
              <FormField label="마감일">
                <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                       className="w-full rounded-sm px-2 py-1.5 text-xs outline-none transition"
                       style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}} />
              </FormField>
              <FormField label="우선순위">
                <select value={priority} onChange={e => setPriority(e.target.value)}
                        className="w-full rounded-sm px-2 py-1.5 text-xs outline-none transition"
                        style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--ink)'}}>
                  {PRIORITY.map(p => <option key={p.id} value={p.id}>{p.label}</option>)}
                </select>
              </FormField>
            </div>
            <FormField label="상태">
              <div className="flex gap-1.5 flex-wrap">
                {STATUS.map(s => (
                  <button key={s.id} type="button" onClick={() => setStatus(s.id)}
                          className="text-xs px-3 py-1.5 rounded-sm transition tracking-wider"
                          style={{
                            border: '1px solid ' + (status === s.id ? 'var(--ink)' : 'var(--border)'),
                            background: status === s.id ? 'var(--ink)' : 'var(--surface)',
                            color: status === s.id ? 'white' : 'var(--text-muted)'
                          }}>
                    <span className={`inline-block w-1.5 h-1.5 rounded-full mr-2 ${s.dot}`}></span>{s.label}
                  </button>
                ))}
              </div>
            </FormField>
            <div className="flex items-center justify-end gap-3 pt-4" style={{borderTop:'1px solid var(--border)'}}>
              <button type="button" onClick={onClose} className="text-sm px-4 py-2 transition" style={{color:'var(--text-muted)'}}>취소</button>
              <button type="submit" disabled={!title.trim() || !brandId || !assigneeId}
                      className="text-sm px-5 py-2 rounded-sm transition disabled:opacity-30 disabled:cursor-not-allowed"
                      style={{background:'var(--ink)', color:'white'}}>
                {mode === 'create' ? '작업 등록' : '저장'}
              </button>
            </div>
          </form>
        </Modal>
      );
    }

    /* ============================================================
       MODAL SHELL
       ============================================================ */
    function Modal({ children, onClose }) {
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, [onClose]);
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
             style={{background:'rgba(30,39,70,0.32)', backdropFilter:'blur(4px)'}}
             onClick={onClose}>
          <div className="w-full max-w-3xl rounded-sm shadow-2xl"
               style={{background:'var(--surface)', border:'1px solid var(--border)'}}
               onClick={e => e.stopPropagation()}>
            {children}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
